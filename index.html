<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多AI聚合助手</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-tertiary:#0f3460;--bg-card:#1e1e3f;--bg-input:#2a2a4a;--bg-hover:#2d2d5e;--text-primary:#e8e8f0;--text-secondary:#a0a0c0;--text-muted:#6a6a8a;--accent:#667eea;--accent-hover:#7c94ff;--border:#333360;--border-light:#444480;--success:#48bb78;--error:#e53e3e;--sidebar-width:280px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;overflow:hidden}
.sidebar{width:var(--sidebar-width);background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;transition:transform .3s ease,width .3s ease;position:relative;z-index:50;flex-shrink:0}
.sidebar.collapsed{transform:translateX(calc(-1 * var(--sidebar-width)));width:0;overflow:hidden;border:none}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-width:var(--sidebar-width)}
.sidebar-header h2{font-size:15px;font-weight:600}
.new-chat-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;transition:background .2s;white-space:nowrap}
.new-chat-btn:hover{background:var(--accent-hover)}
.chat-list{flex:1;overflow-y:auto;padding:8px;min-width:var(--sidebar-width)}
.chat-list::-webkit-scrollbar{width:4px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-item{padding:12px 14px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .15s;position:relative}
.chat-item:hover{background:var(--bg-hover)}
.chat-item.active{background:var(--bg-tertiary)}
.chat-item-title{font-size:13px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;padding-right:24px}
.chat-item-time{font-size:11px;color:var(--text-muted)}
.chat-item-delete{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:4px;opacity:0;transition:opacity .15s}
.chat-item:hover .chat-item-delete{opacity:1}
.chat-item-delete:hover{color:var(--error);background:rgba(229,62,62,.1)}
.main-content{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.top-bar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg-secondary)}
.toggle-sidebar-btn{background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s}
.toggle-sidebar-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.top-bar-title{font-size:16px;font-weight:600;flex:1}
.key-btn{background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
.key-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.model-bar{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg-secondary);flex-shrink:0}
.model-bar-label{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.model-toggle{display:flex;flex-wrap:wrap;gap:6px}
.model-tag{padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg-input);color:var(--text-secondary);transition:all .2s;user-select:none}
.model-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.model-tag:hover{border-color:var(--accent)}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-area.single-mode .message-row{display:flex;margin-bottom:16px;max-width:75%}
.chat-area.single-mode .message-row.user{align-self:flex-end}
.chat-area.single-mode .message-row.assistant{align-self:flex-start}
.message-bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.message-row.user .message-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.message-row.assistant .message-bubble{background:var(--bg-card);color:var(--text-primary);border-bottom-left-radius:4px;border:1px solid var(--border)}
.message-row.assistant .message-bubble.error{color:var(--error);border-color:var(--error)}
.chat-area.multi-mode{flex-direction:row;gap:12px;padding:12px;overflow-x:auto;align-items:stretch}
.multi-column{flex:1;min-width:280px;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg-card)}
.multi-column-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg-secondary)}
.multi-column-header .model-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.multi-column-header .model-company{font-size:11px;color:var(--text-muted);margin-top:2px}
.multi-column-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.multi-column-body::-webkit-scrollbar{width:4px}
.multi-column-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.multi-msg{padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.multi-msg.user{background:var(--accent);color:#fff;align-self:flex-end;max-width:85%;border-bottom-right-radius:4px}
.multi-msg.assistant{background:var(--bg-input);color:var(--text-primary);align-self:flex-start;max-width:95%;border-bottom-left-radius:4px}
.multi-msg.error{color:var(--error)}
.streaming-cursor::after{content:'▋';display:inline-block;animation:blink .8s infinite;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:12px}
.empty-state .icon{font-size:48px;opacity:.5}
.empty-state .text{font-size:15px}
.input-area{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg-secondary);flex-shrink:0}
.input-row{display:flex;gap:12px;align-items:flex-end;max-width:900px;margin:0 auto}
.input-textarea{flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text-primary);resize:none;min-height:48px;max-height:150px;font-family:inherit;line-height:1.5;transition:border .2s}
.input-textarea:focus{outline:none;border-color:var(--accent)}
.input-textarea::placeholder{color:var(--text-muted)}
.send-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;cursor:pointer;transition:background .2s;white-space:nowrap;height:48px}
.send-btn:hover{background:var(--accent-hover)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-hint{font-size:11px;color:var(--text-muted);margin-top:6px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:28px;width:460px;max-width:95vw}
.modal h2{font-size:17px;margin-bottom:8px;color:var(--text-primary)}
.modal .hint{font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.6}
.modal .hint a{color:var(--accent)}
.modal input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:16px;font-family:inherit;color:var(--text-primary)}
.modal input:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-btns button{padding:8px 22px;border-radius:8px;border:none;cursor:pointer;font-size:14px}
.btn-cancel{background:var(--bg-input);color:var(--text-secondary)}
.btn-cancel:hover{background:var(--bg-hover)}
.btn-save{background:var(--accent);color:#fff}
.btn-save:hover{background:var(--accent-hover)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
.sidebar-overlay.visible{display:block}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:100}
  .sidebar.collapsed{transform:translateX(-100%)}
  .chat-area.multi-mode{flex-direction:column}
  .multi-column{min-width:0}
  .chat-area.single-mode .message-row{max-width:90%}
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>💬 对话历史</h2>
    <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="main-content">
  <div class="top-bar">
    <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
    <div class="top-bar-title">🤖 多AI聚合助手</div>
    <button class="key-btn" onclick="openKeyModal()">⚙️ API Key</button>
  </div>

  <div class="model-bar">
    <div class="model-bar-label">选择模型（单选 = 深度对话，多选 = 并排对比）</div>
    <div class="model-toggle" id="modelToggle"></div>
  </div>

  <div class="chat-area single-mode" id="chatArea">
    <div class="empty-state"><div class="icon">🤖</div><div class="text">点击「+ 新对话」开始</div></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea class="input-textarea" id="userInput" placeholder="输入消息..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
    <div class="input-hint">Ctrl+Enter 发送 · 单模型支持多轮深度对话 · 多模型并排对比</div>
  </div>
</div>

<div class="modal-overlay hidden" id="keyModal">
  <div class="modal">
    <h2>🔑 设置 OpenRouter API Key</h2>
    <p class="hint">Key 仅存在你的浏览器本地，不会上传任何服务器。<br>免费获取：<a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> → 注册 → Create Key</p>
    <input type="password" id="keyInput" placeholder="sk-or-v1-..." />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeKeyModal()">取消</button>
      <button class="btn-save" onclick="saveKey()">保存</button>
    </div>
  </div>
</div>

<script>
const MODELS=[
{id:'nvidia/nemotron-3-super-120b-a12b:free',name:'Nemotron 3 Super 120B',company:'NVIDIA'},
{id:'openai/gpt-oss-120b:free',name:'GPT-OSS 120B',company:'OpenAI'},
{id:'nousresearch/hermes-3-llama-3.1-405b:free',name:'Hermes 3 405B',company:'NousResearch'},
{id:'inclusionai/ling-2.6-1t:free',name:'Ling 2.6 1T',company:'InclusionAI'},
{id:'minimax/minimax-m2.5:free',name:'MiniMax M2.5',company:'MiniMax'},
{id:'tencent/hy3-preview:free',name:'HY3 Preview',company:'Tencent'},
{id:'z-ai/glm-4.5-air:free',name:'GLM 4.5 Air',company:'Zhipu AI'},
{id:'nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free',name:'Nemotron Nano Reasoning',company:'NVIDIA'}
];

const MAX_RETRIES=2,RETRY_DELAY=1500,MAX_HISTORY=10;

let apiKey=(localStorage.getItem('multi_ai_key')||'').replace(/[^\x00-\x7F]/g,'');
let activeModels=new Set();
let conversations=[];
let currentChatId=null;
let abortControllers=[];
let isSending=false;

function init(){
  loadConversations();
  activeModels.add(MODELS[0].id);
  renderModelToggle();
  renderChatList();
  if(!apiKey)setTimeout(openKeyModal,600);
  const ta=document.getElementById('userInput');
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,150)+'px';});
  ta.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();sendMessage();}});
  if(window.innerWidth<=768)document.getElementById('sidebar').classList.add('collapsed');
  if(conversations.length>0)switchChat(conversations[0].id);
  else renderChatArea();
}

function loadConversations(){try{const d=localStorage.getItem('multi_ai_conversations');conversations=d?JSON.parse(d):[];}catch(e){conversations=[];}}
function saveConversations(){localStorage.setItem('multi_ai_conversations',JSON.stringify(conversations));}
function getCurrentChat(){return conversations.find(c=>c.id===currentChatId);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function safeId(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function formatTime(ts){const d=new Date(ts);const now=new Date();const diff=now-d;if(diff<86400000)return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});if(diff<604800000)return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});return d.toLocaleDateString('zh-CN',{year:'numeric',month:'short',day:'numeric'});}

// Sidebar
function toggleSidebar(){
  const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('collapsed');
  if(window.innerWidth<=768)ov.classList.toggle('visible',!sb.classList.contains('collapsed'));
}

function renderChatList(){
  const list=document.getElementById('chatList');
  if(conversations.length===0){list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">暂无对话</div>';return;}
  list.innerHTML=conversations.map(c=>`<div class="chat-item ${c.id===currentChatId?'active':''}" onclick="switchChat('${c.id}')"><div class="chat-item-title">${escapeHtml(c.title||'新对话')}</div><div class="chat-item-time">${formatTime(c.createdAt)}</div><button class="chat-item-delete" onclick="event.stopPropagation();deleteChat('${c.id}')" title="删除">🗑</button></div>`).join('');
}

function newChat(){
  abortAll();
  const chat={id:genId(),title:'新对话',createdAt:Date.now(),selectedModels:Array.from(activeModels),models:{}};
  activeModels.forEach(mid=>{chat.models[mid]=[];});
  conversations.unshift(chat);
  saveConversations();
  switchChat(chat.id);
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.add('collapsed');document.getElementById('sidebarOverlay').classList.remove('visible');}
}

function switchChat(chatId){
  abortAll();
  currentChatId=chatId;
  const chat=getCurrentChat();
  if(chat&&chat.selectedModels){activeModels=new Set(chat.selectedModels);renderModelToggle();}
  renderChatList();
  renderChatArea();
}

function deleteChat(chatId){
  conversations=conversations.filter(c=>c.id!==chatId);
  saveConversations();
  if(currentChatId===chatId){currentChatId=conversations.length>0?conversations[0].id:null;}
  renderChatList();
  renderChatArea();
}

// Model toggle
function renderModelToggle(){
  const wrap=document.getElementById('modelToggle');
  wrap.innerHTML='';
  MODELS.forEach(m=>{
    const tag=document.createElement('span');
    tag.className='model-tag'+(activeModels.has(m.id)?' active':'');
    tag.textContent=m.name;
    tag.title=m.company;
    tag.onclick=()=>toggleModel(m.id);
    wrap.appendChild(tag);
  });
}

function toggleModel(id){
  if(activeModels.has(id)){if(activeModels.size<=1)return;activeModels.delete(id);}
  else{activeModels.add(id);}
  renderModelToggle();
  const chat=getCurrentChat();
  if(chat){
    chat.selectedModels=Array.from(activeModels);
    activeModels.forEach(mid=>{if(!chat.models[mid])chat.models[mid]=[];});
    saveConversations();
  }
  renderChatArea();
}

// Chat area
function renderChatArea(){
  const area=document.getElementById('chatArea');
  const chat=getCurrentChat();
  if(!chat){area.className='chat-area single-mode';area.innerHTML='<div class="empty-state"><div class="icon">🤖</div><div class="text">点击「+ 新对话」开始</div></div>';return;}
  const sel=Array.from(activeModels);
  const isSingle=sel.length===1;
  if(isSingle){
    area.className='chat-area single-mode';
    const mid=sel[0],msgs=chat.models[mid]||[];
    if(msgs.length===0){const model=MODELS.find(m=>m.id===mid);area.innerHTML=`<div class="empty-state"><div class="icon">💬</div><div class="text">与 ${model?model.name:'模型'} 对话</div></div>`;}
    else{area.innerHTML=msgs.map(msg=>`<div class="message-row ${msg.role}"><div class="message-bubble${msg.error?' error':''}">${escapeHtml(msg.content)}</div></div>`).join('');}
  }else{
    area.className='chat-area multi-mode';
    area.innerHTML=sel.map(mid=>{
      const model=MODELS.find(m=>m.id===mid);
      const msgs=chat.models[mid]||[];
      return `<div class="multi-column" id="col-${safeId(mid)}"><div class="multi-column-header"><div class="model-name">${model?model.name:mid}</div><div class="model-company">${model?model.company:''}</div></div><div class="multi-column-body" id="colbody-${safeId(mid)}">${msgs.length===0?'<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">等待消息...</div>':msgs.map(msg=>`<div class="multi-msg ${msg.role}${msg.error?' error':''}">${escapeHtml(msg.content)}</div>`).join('')}</div></div>`;
    }).join('');
  }
  scrollToBottom();
}

function scrollToBottom(){
  const area=document.getElementById('chatArea');
  if(area.classList.contains('single-mode')){setTimeout(()=>area.scrollTop=area.scrollHeight,50);}
  else{area.querySelectorAll('.multi-column-body').forEach(el=>{setTimeout(()=>el.scrollTop=el.scrollHeight,50);});}
}

// Send
function abortAll(){abortControllers.forEach(c=>c.abort());abortControllers=[];isSending=false;document.getElementById('sendBtn').disabled=false;}

async function sendMessage(){
  const input=document.getElementById('userInput');
  const question=input.value.trim();
  if(!question||isSending)return;
  if(!apiKey){openKeyModal();return;}
  if(!currentChatId)newChat();

  const chat=getCurrentChat();
  if(!chat)return;

  isSending=true;
  document.getElementById('sendBtn').disabled=true;
  input.value='';input.style.height='auto';

  // Update title if first message
  if(chat.title==='新对话'){chat.title=question.slice(0,20);renderChatList();}

  const sel=Array.from(activeModels);
  // Ensure models initialized
  sel.forEach(mid=>{if(!chat.models[mid])chat.models[mid]=[];});

  // Add user message to all active models
  sel.forEach(mid=>{chat.models[mid].push({role:'user',content:question});});
  saveConversations();
  renderChatArea();

  // Call each model
  abortControllers=[];
  let pending=sel.length;

  sel.forEach(mid=>{
    const ctrl=new AbortController();
    abortControllers.push(ctrl);
    callModel(mid,chat,ctrl.signal).then(()=>{
      pending--;
      if(pending<=0){isSending=false;document.getElementById('sendBtn').disabled=false;}
    });
  });
}

async function callModel(modelId,chat,signal){
  const model=MODELS.find(m=>m.id===modelId);
  const msgs=chat.models[modelId];
  const isSingle=activeModels.size===1;

  // Build messages for API (last MAX_HISTORY turns)
  const historyMsgs=msgs.slice(-MAX_HISTORY*2).map(m=>({role:m.role,content:m.content}));

  // Add placeholder for streaming
  const assistantIdx=msgs.length;
  msgs.push({role:'assistant',content:'',streaming:true});
  saveConversations();

  // Render streaming element
  appendStreamingEl(modelId,isSingle);

  let fullText='';
  let lastErr=null;
  let res=null;

  for(let attempt=0;attempt<MAX_RETRIES;attempt++){
    try{
      res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
        method:'POST',signal,
        headers:{'Authorization':`Bearer ${apiKey}`,'Content-Type':'application/json','HTTP-Referer':location.href,'X-Title':'Multi-AI Assistant'},
        body:JSON.stringify({model:modelId,stream:true,messages:historyMsgs})
      });
      if(!res.ok){const err=await res.json().catch(()=>({}));lastErr=err.error?.message||`HTTP ${res.status}`;if(attempt<MAX_RETRIES-1){await new Promise(r=>setTimeout(r,RETRY_DELAY));continue;}throw new Error(lastErr);}
      break;
    }catch(e){
      if(e.name==='AbortError')throw e;
      lastErr=e.message;
      if(attempt<MAX_RETRIES-1){await new Promise(r=>setTimeout(r,RETRY_DELAY));continue;}
      throw e;
    }
  }

  try{
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const d=line.slice(6).trim();
        if(d==='[DONE]')continue;
        try{const delta=JSON.parse(d).choices?.[0]?.delta?.content||'';if(delta){fullText+=delta;updateStreamingEl(modelId,fullText,isSingle);}}catch(e){}
      }
    }
    // Finalize
    msgs[assistantIdx]={role:'assistant',content:fullText||'（未返回内容）'};
    if(!fullText)msgs[assistantIdx].error=true;
    delete msgs[assistantIdx].streaming;
    saveConversations();
    finalizeStreamingEl(modelId,fullText,isSingle);
  }catch(e){
    if(e.name==='AbortError'){msgs.splice(assistantIdx,1);saveConversations();return;}
    msgs[assistantIdx]={role:'assistant',content:`❌ 请求失败：${e.message}`,error:true};
    delete msgs[assistantIdx].streaming;
    saveConversations();
    finalizeStreamingEl(modelId,`❌ 请求失败：${e.message}`,isSingle,true);
  }
}

function appendStreamingEl(modelId,isSingle){
  if(isSingle){
    const area=document.getElementById('chatArea');
    const row=document.createElement('div');
    row.className='message-row assistant';
    row.id='streaming-'+safeId(modelId);
    row.innerHTML='<div class="message-bubble streaming-cursor"></div>';
    // Remove empty state
    const empty=area.querySelector('.empty-state');if(empty)empty.remove();
    area.appendChild(row);
    area.scrollTop=area.scrollHeight;
  }else{
    const body=document.getElementById('colbody-'+safeId(modelId));
    if(!body)return;
    // Remove placeholder
    const ph=body.querySelector('[style]');if(ph&&ph.textContent.includes('等待'))ph.remove();
    const el=document.createElement('div');
    el.className='multi-msg assistant streaming-cursor';
    el.id='streaming-'+safeId(modelId);
    body.appendChild(el);
    body.scrollTop=body.scrollHeight;
  }
}

function updateStreamingEl(modelId,text,isSingle){
  if(isSingle){
    const row=document.getElementById('streaming-'+safeId(modelId));
    if(row){const bubble=row.querySelector('.message-bubble');if(bubble)bubble.textContent=text;}
    const area=document.getElementById('chatArea');
    area.scrollTop=area.scrollHeight;
  }else{
    const el=document.getElementById('streaming-'+safeId(modelId));
    if(el)el.textContent=text;
    const body=document.getElementById('colbody-'+safeId(modelId));
    if(body)body.scrollTop=body.scrollHeight;
  }
}

function finalizeStreamingEl(modelId,text,isSingle,isError=false){
  if(isSingle){
    const row=document.getElementById('streaming-'+safeId(modelId));
    if(row){const bubble=row.querySelector('.message-bubble');if(bubble){bubble.classList.remove('streaming-cursor');bubble.textContent=text;if(isError)bubble.classList.add('error');}}
  }else{
    const el=document.getElementById('streaming-'+safeId(modelId));
    if(el){el.classList.remove('streaming-cursor');el.textContent=text;if(isError)el.classList.add('error');}
  }
}

// Key modal
function openKeyModal(){document.getElementById('keyInput').value=apiKey;document.getElementById('keyModal').classList.remove('hidden');setTimeout(()=>document.getElementById('keyInput').focus(),100);}
function closeKeyModal(){document.getElementById('keyModal').classList.add('hidden');}
function saveKey(){const val=document.getElementById('keyInput').value.trim().replace(/[^\x00-\x7F]/g,'');if(val){apiKey=val;localStorage.setItem('multi_ai_key',val);}closeKeyModal();}
document.getElementById('keyModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeKeyModal();});

init();
</script>
