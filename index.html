<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" id="themeColorMeta" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>Multi AI Studio</title>
<script src="https://unpkg.com/marked@15.0.4/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" media="all">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" media="not all">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root{--bg-primary:#ffffff;--bg-secondary:#f9fafb;--bg-tertiary:#f0f1f3;--text-primary:#1a1a1a;--text-secondary:#666;--text-tertiary:#999;--accent:#5b6abf;--accent-light:#eef1fe;--border:#eaedf0;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);--success:#52c41a;--warning:#faad14;--error:#ff4d4f}
[data-theme="dark"]{--bg-primary:#0d0d0d;--bg-secondary:#171717;--bg-tertiary:#1e1e1e;--text-primary:#e8e8e8;--text-secondary:#aaa;--text-tertiary:#777;--accent:#8b9cf7;--accent-light:#2a2f4a;--border:#2a2a2a;--shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 12px rgba(0,0,0,.3);--success:#52c41a;--warning:#faad14;--error:#ff4d4f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;font-size:15px;line-height:1.7;letter-spacing:.01em;color:var(--text-primary);background:var(--bg-primary);height:100vh;overflow:hidden;transition:background .3s,color .3s}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
.app{display:flex;height:100vh}
/* Sidebar */
.sidebar{width:260px;min-width:260px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1),width .3s,min-width .3s;overflow:hidden;z-index:100}
.sidebar.collapsed{width:0;min-width:0;border-right:none;transform:translateX(-260px)}
.sidebar.collapsed .hide-c{display:none}
.sidebar.collapsed .show-c{display:flex!important}
.show-c{display:none!important}
.sb-head{padding:18px 20px;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;white-space:nowrap}
.brand-icon{width:30px;height:30px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-new{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--accent);color:#fff;border-radius:var(--radius-md);font-size:13px;font-weight:500;transition:all .2s;width:calc(100% - 28px);justify-content:center;margin:0 14px 10px}
.btn-new:hover{background:#4a5aad;box-shadow:var(--shadow-sm)}
.btn-new svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sidebar.collapsed .btn-new{display:none}
.sidebar.collapsed .btn-new .btn-text{display:none}
.sb-search{margin:0 14px 10px;position:relative}
.sb-search input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s}
.sb-search input:focus{border-color:var(--accent)}
.sb-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text-tertiary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px;scrollbar-width:thin}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.grp-title-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;margin-top:8px}
.grp-title-row span{font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:.5px;text-transform:uppercase}
.grp-title-row button{padding:2px 6px;border-radius:4px;color:var(--text-tertiary);transition:all .2s;font-size:14px}
.grp-title-row button:hover{color:var(--accent);background:var(--accent-light)}
.grp-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:background .15s;user-select:none}
.grp-hdr:hover{background:var(--bg-tertiary)}
.grp-hdr.active{background:rgba(91,106,191,.08);color:var(--accent)}
.grp-hdr svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.grp-hdr.collapsed svg.arrow{transform:rotate(-90deg)}
.grp-acts{margin-left:auto;display:none;gap:2px}
.grp-hdr:hover .grp-acts{display:flex}
.grp-acts button{padding:3px;border-radius:4px;color:var(--text-tertiary);transition:all .2s}
.grp-acts button:hover{color:var(--accent);background:var(--accent-light)}
.grp-acts button svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.grp-body{overflow:hidden;transition:max-height .3s;padding-left:8px}
.grp-body.collapsed{max-height:0!important}
.chat-item{display:flex;align-items:center;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;margin-bottom:2px}
.chat-item:hover{background:var(--bg-tertiary)}
.chat-item.active{background:rgba(91,106,191,.08);color:var(--accent)}
.chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.chat-acts{display:none;gap:2px;margin-left:6px}
.chat-item:hover .chat-acts{display:flex}
.chat-acts button{padding:3px;border-radius:4px;color:var(--text-tertiary);transition:all .2s}
.chat-acts button:hover{color:var(--error)}
.chat-acts button svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.edit-input{flex:1;background:var(--bg-primary);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--text-primary);outline:none}
.sb-foot{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.sb-foot-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);transition:background .15s;cursor:pointer}
.sb-foot-item:hover{background:var(--bg-tertiary)}
.sb-foot-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sb-foot-item .lbl{flex:1;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .sb-foot-item .lbl,.sidebar.collapsed .sb-foot-item .kst{display:none}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.top-bar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg-primary);display:flex;align-items:center;gap:10px}
.top-bar svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-hamburger{display:none;padding:6px;border-radius:var(--radius-sm);color:var(--text-secondary)}
.btn-hamburger:hover{background:var(--bg-tertiary)}
.btn-sidebar-toggle{padding:6px;border-radius:var(--radius-sm);color:var(--text-tertiary);transition:all .2s}
.btn-sidebar-toggle:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.btn-topbar{padding:6px;border-radius:var(--radius-sm);color:var(--text-secondary);transition:all .2s}
.btn-topbar:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.btn-topbar svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.top-title{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-trigger{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all .2s}
.model-trigger:hover{border-color:var(--accent);color:var(--accent)}
.model-trigger .cnt{background:var(--accent);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;font-weight:600}
/* Model Panel */
.model-panel{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center}
.model-panel.show{display:flex}
.model-panel-bg{position:absolute;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
.model-panel-body{position:relative;background:var(--bg-primary);border-radius:var(--radius-lg);width:100%;max-width:900px;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-md);animation:fadeScale .2s ease}
@keyframes fadeScale{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:768px){.model-panel{align-items:flex-end}.model-panel-body{border-radius:var(--radius-lg) var(--radius-lg) 0 0;max-width:100%;animation:slideUp .25s ease}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mp-top-line{height:3px;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;margin:-24px -24px 20px}
.mp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mp-hdr h3{font-size:16px;font-weight:600}
.mp-subtitle{display:block;font-size:12px;color:var(--text-tertiary);margin-top:2px}
.mp-footer{margin-top:18px;display:flex;justify-content:center;gap:12px}
.mp-confirm{padding:8px 28px;background:var(--accent);color:#fff;border-radius:20px;font-size:13px;font-weight:500;transition:all .2s;border:none;cursor:pointer}
.mp-confirm:hover{background:#4a5aad;box-shadow:var(--shadow-sm)}
.mp-cancel{padding:8px 28px;background:var(--bg-tertiary);color:var(--text-secondary);border-radius:20px;font-size:13px;font-weight:500;transition:all .2s;border:1px solid var(--border);cursor:pointer}
.mp-cancel:hover{background:var(--bg-secondary);color:var(--text-primary)}
/* Tier headers */
.tier-hdr{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:12px;font-weight:600}
.tier-hdr-icon{font-size:14px}
.tier-hdr-name{font-weight:700;font-size:13px}
.tier-hdr-sep{color:var(--text-tertiary);font-weight:400}
.tier-hdr-desc{font-weight:400;color:var(--text-secondary);font-size:12px}
.tier-hdr--s{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,165,0,.08));color:#b8860b}
[data-theme="dark"] .tier-hdr--s{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.06));color:#ffd700}
.tier-hdr--a{background:rgba(59,130,246,.08);color:#2563eb}
[data-theme="dark"] .tier-hdr--a{background:rgba(59,130,246,.1);color:#60a5fa}
.tier-hdr--b{background:var(--bg-tertiary);color:var(--text-secondary)}
/* Model cards */
.tier-cards{display:flex;flex-direction:column;gap:6px}
.mcard{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-primary);cursor:pointer;transition:all .2s;height:56px;user-select:none}
.mcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--text-tertiary)}
[data-theme="dark"] .mcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.2)}
.mcard--sel{border-left:3px solid var(--accent);background:var(--accent-light)}
.mcard--sel:hover{border-color:var(--accent)}
.mcard-icon{width:36px;height:36px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;overflow:hidden}
.mcard-icon img{width:22px;height:22px;object-fit:contain}
.mcard-info{flex:1;min-width:0}
.mcard-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.mtag{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg-tertiary);color:var(--text-secondary);white-space:nowrap}
.mcard--sel .mtag{background:rgba(91,106,191,.1);color:var(--accent)}
.mcard-check{width:22px;height:22px;flex-shrink:0}
.mcard-check svg{width:22px;height:22px}
.mcard-check svg circle{fill:none;stroke:var(--border);stroke-width:1.5}
.mcard-check--on svg circle{fill:var(--accent);stroke:var(--accent)}
.mcard-check--on svg path{stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
@media(max-width:768px){.mcard{height:auto;padding:10px 12px}}
.mp-close{padding:6px;border-radius:var(--radius-sm);color:var(--text-tertiary);transition:all .2s}
.mp-close:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.mp-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tiers-row{display:flex;gap:16px}
.tiers-row .tier{flex:1;min-width:0;margin-bottom:0}
@media(max-width:768px){.tiers-row{flex-direction:column}.tiers-row .tier{margin-bottom:14px}.tiers-row .tier:last-child{margin-bottom:0}}
.tier{margin-bottom:14px}.tier:last-child{margin-bottom:0}
/* Chat Area */
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;scrollbar-width:thin}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
.chat-wrap{width:100%;max-width:800px}
.msg{margin-bottom:24px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{display:flex;justify-content:flex-end}
.msg.ai{display:flex;flex-direction:column;align-items:flex-start}
.bubble{padding:14px 20px;border-radius:var(--radius-lg);line-height:1.8;word-break:break-word;max-width:min(720px,85vw)}
.msg.user .bubble{background:#2d2d2d;color:#fff;border-bottom-right-radius:4px}
[data-theme="dark"] .msg.user .bubble{background:#e8e8e8;color:#1a1a1a}
.msg.ai .bubble{background:#ffffff;color:var(--text-primary);border-bottom-left-radius:4px;border:none}
[data-theme="dark"] .msg.ai .bubble{background:#1e1e1e}
.msg .mname{font-size:12px;color:var(--text-tertiary);margin-bottom:4px;font-weight:500}
.bubble code{background:rgba(0,0,0,.06);padding:2px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono','Fira Code',monospace}
.bubble pre{background:var(--bg-tertiary);padding:12px 14px;border-radius:var(--radius-sm);overflow-x:auto;margin:8px 0;font-size:13px;font-family:'SF Mono','Fira Code',monospace;border:1px solid var(--border)}
[data-theme="dark"] .bubble code{background:rgba(255,255,255,.08)}
.bubble ul,.bubble ol{padding-left:20px;margin:8px 0}
.bubble li{margin:4px 0;line-height:1.7}
.bubble strong{font-weight:600}
.bubble h1,.bubble h2,.bubble h3{margin:12px 0 6px;line-height:1.4}
.bubble h1{font-size:18px}.bubble h2{font-size:16px}.bubble h3{font-size:15px}
.bubble p{margin:6px 0}
.bubble blockquote{border-left:3px solid var(--accent);padding:6px 12px;margin:8px 0;color:var(--text-secondary);background:var(--bg-tertiary);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.bubble table{border-collapse:collapse;margin:8px 0;font-size:13px;width:100%}
.bubble th,.bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.bubble th{background:var(--bg-tertiary);font-weight:600}
/* Message Actions */
.msg-actions{display:flex;gap:2px;margin-top:6px;opacity:0;transition:opacity .2s}
.msg.ai:hover .msg-actions{opacity:1}
.msg-act{padding:5px 7px;border-radius:6px;color:var(--text-tertiary);transition:all .15s;display:flex;align-items:center;gap:4px;font-size:12px}
.msg-act:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.msg-act.liked{color:var(--success)}
.msg-act.disliked{color:var(--error)}
.msg-act svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Thinking */
.thinking-block{margin:0 0 10px;border-radius:var(--radius-sm);overflow:hidden}
.thinking-summary{display:flex;align-items:center;gap:6px;padding:8px 12px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-radius:var(--radius-sm);transition:background .2s;user-select:none}
.thinking-summary:hover{background:var(--bg-tertiary)}
.thinking-summary svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dot-anim{display:inline-flex;gap:3px;margin-left:4px}
.dot-anim span{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:dotP 1.4s infinite}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes dotP{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.thinking-body{padding:10px 14px;font-size:13px;color:var(--text-secondary);max-height:200px;overflow-y:auto;background:var(--bg-tertiary);border-radius:var(--radius-sm);margin-top:4px;border:1px solid var(--border);opacity:.85}
.thinking-done{font-size:12px;color:var(--text-tertiary);padding:4px 10px;background:var(--bg-tertiary);border-radius:14px;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
.cursor{display:inline-block;width:2px;height:16px;background:var(--accent);margin-left:2px;animation:blink 1s infinite;vertical-align:middle}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
/* Multi Column */
.cols{display:flex;gap:20px;flex:1;overflow-x:auto;padding:20px;width:100%}
.col{flex:1;min-width:300px;max-width:520px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.04),0 0 1px rgba(0,0,0,.06)}
.col-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.col-hdr .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.col-msgs{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin}
.col-msgs::-webkit-scrollbar{width:4px}
.col-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.col-in{padding:10px;border-top:1px solid var(--border)}
.col-input-wrap{display:flex;gap:8px;align-items:flex-end}
.col-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s}
.col-input:focus{border-color:var(--accent)}
.col-send{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.col-send:hover{background:#3d5ce5}
.col-send svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.col-tools{display:flex;gap:4px;margin-top:6px}
.col-tbtn{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:8px;font-size:11px;color:var(--text-tertiary);transition:all .2s;border:1px solid transparent}
.col-tbtn:hover{color:var(--accent);background:var(--accent-light);border-color:var(--accent)}
.col-tbtn.active{color:var(--accent);background:var(--accent-light);border-color:var(--accent)}
.col-tbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.col-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:14px;font-size:11px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);background:var(--accent-light);margin-left:4px;font-weight:500;transition:all .2s}
.col-badge:hover{border-color:var(--accent)}
.col-badge .rx{cursor:pointer;margin-left:3px;font-size:13px;opacity:.6;transition:opacity .15s}
.col-badge .rx:hover{opacity:1}
.col-tool-popup{background:var(--bg-primary);border:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);padding:8px;min-width:160px;backdrop-filter:blur(16px) saturate(1.4);animation:menuIn .2s cubic-bezier(.2,0,.13,1.2)}
.ctp-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;cursor:pointer;border-radius:10px;white-space:nowrap;color:var(--text-secondary);transition:all .18s;font-weight:400}

/* Input Area */
.input-area{padding:14px 24px 20px;background:var(--bg-primary);border-top:1px solid var(--border)}
.input-wrap{max-width:800px;margin:0 auto;position:relative}
.input-box{background:var(--bg-secondary);border:1px solid var(--border);border-radius:20px;padding:12px 16px;transition:border-color .2s,box-shadow .2s;box-shadow:0 2px 12px rgba(0,0,0,.04)}

#mainInput{width:100%;border:none;background:none;resize:none;font-size:15px;line-height:1.6;color:var(--text-primary);outline:none;min-height:26px;max-height:150px;font-family:inherit}

.input-toolbar{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.itb-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;color:var(--text-secondary);transition:all .2s;user-select:none;border:1px solid var(--border)}

.itb-btn.active{background:var(--accent-light);color:var(--accent);font-weight:500;border-color:var(--accent)}
.itb-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

.send-btn.active:hover{background:#3d5ce5;transform:scale(1.05)}
.send-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.tool-menu{position:absolute;bottom:100%;left:60px;background:var(--bg-primary);border:1px solid color-mix(in srgb,var(--border) 60%,transparent);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);padding:8px;display:none;min-width:160px;z-index:200;margin-bottom:8px;backdrop-filter:blur(16px) saturate(1.4)}
.tool-menu.show{display:block;animation:menuIn .2s cubic-bezier(.2,0,.13,1.2)}
@keyframes menuIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.tm-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:13px;transition:all .18s;color:var(--text-secondary);cursor:pointer}
.tm-item:hover{background:linear-gradient(135deg,var(--accent-light),color-mix(in srgb,var(--accent) 8%,transparent));color:var(--accent);transform:translateX(2px)}
.tm-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.8;transition:opacity .15s}

.tool-badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}

/* Chat Dropdown (3-dot menu) */
.chat-dots{display:none;padding:3px 6px;border-radius:4px;color:var(--text-tertiary);transition:all .2s;font-size:16px;line-height:1;letter-spacing:-1px}

.chat-dots:hover{color:var(--text-primary);background:var(--bg-tertiary)}
.chat-dropdown{position:absolute;right:8px;top:100%;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);padding:4px;z-index:1000;width:fit-content;min-width:0;display:none}

.cd-item{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:6px;font-size:13px;transition:background .15s;cursor:pointer;position:relative;white-space:nowrap}

.cd-item.danger{color:var(--error)}

.cd-item:hover .cd-sub{display:block}
.cd-sub .cd-item{padding:6px 10px}
/* Folder detail page */
.folder-detail{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:32px 24px;align-items:center}
.fd-wrap{width:100%;max-width:800px}
.fd-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.fd-header svg{width:28px;height:28px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

.fd-cards{display:flex;gap:14px;margin-bottom:28px}
.fd-card{flex:1;padding:16px;border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:6px}
.fd-card:hover{border-color:var(--accent);background:var(--accent-light)}
.fd-card .fc-icon{width:32px;height:32px;background:var(--bg-tertiary);border-radius:8px;display:flex;align-items:center;justify-content:center}
.fd-card .fc-icon svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.fd-card .fc-title{font-size:14px;font-weight:500}
.fd-card .fc-desc{font-size:12px;color:var(--text-tertiary)}

.fd-chat-item{display:flex;align-items:center;padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;margin-bottom:4px}

.fd-chat-item .fdc-title{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd-chat-item .fdc-time{font-size:11px;color:var(--text-tertiary)}
.fd-input-area{padding:14px 0;margin-top:auto}
/* Sidebar top icons row */
.sb-top-icons{display:flex;align-items:center;gap:4px;padding:10px 14px 6px}
.sb-top-icon{padding:6px;border-radius:var(--radius-sm);color:var(--text-secondary);transition:all .2s}
.sb-top-icon:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.sb-top-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
/* Brand entry */
.sb-brand-entry{display:flex;align-items:center;gap:10px;padding:8px 14px;margin:4px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s}

.sb-brand-entry .bre-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-brand-entry .bre-icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-brand-entry span{font-size:14px;font-weight:600}
/* Collapse groups btn */
.collapse-grp-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;margin:4px 8px;border-radius:var(--radius-sm);font-size:12px;color:var(--text-tertiary);cursor:pointer;transition:all .15s}
.collapse-grp-btn:hover{background:var(--bg-tertiary);color:var(--text-secondary)}
.collapse-grp-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Custom dialog (元宝风格) */
.cdlg-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:600}
.cdlg-bg.show{display:flex}
.cdlg{background:var(--bg-primary);border-radius:14px;padding:24px 24px 20px;width:360px;max-width:88vw;box-shadow:0 8px 32px rgba(0,0,0,.25);animation:modalIn .2s ease}
.cdlg-title{font-size:15px;font-weight:600;margin-bottom:16px}
.cdlg-input{width:100%;padding:10px 12px;border:none;border-bottom:2px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;border-radius:6px 6px 0 0;outline:none;transition:border-color .2s}
.cdlg-input:focus{border-bottom-color:var(--accent)}
.cdlg-msg{font-size:14px;color:var(--text-secondary);line-height:1.6}
.cdlg-acts{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.cdlg-acts button{padding:8px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.cdlg-acts .cdlg-cancel{background:var(--bg-tertiary);color:var(--text-secondary)}
.cdlg-acts .cdlg-cancel:hover{background:var(--border)}
.cdlg-acts .cdlg-ok{background:var(--accent);color:#fff}
.cdlg-acts .cdlg-ok:hover{opacity:.85}
/* System prompt modal */
.sp-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:500}
.sp-modal-bg.show{display:flex}
.sp-modal{background:var(--bg-primary);border-radius:var(--radius-lg);padding:24px;width:480px;max-width:90vw;box-shadow:var(--shadow-md);animation:modalIn .25s ease}
.sp-modal h3{font-size:16px;font-weight:600;margin-bottom:12px}
.sp-modal textarea{width:100%;height:160px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:border-color .2s}
.sp-modal textarea:focus{border-color:var(--accent)}
.sp-modal .sp-acts{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
/* Context Menu */
.ctx-menu{position:fixed;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);padding:4px;z-index:1000;min-width:150px;display:none}
.ctx-menu.show{display:block;animation:menuIn .15s ease}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:13px;transition:background .15s;cursor:pointer}
.ctx-item:hover{background:var(--accent-light)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:500}
.modal-bg.show{display:flex}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg);padding:28px;width:420px;max-width:90vw;box-shadow:var(--shadow-md);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h2{font-size:17px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.modal h2 svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.modal p{font-size:13px;color:var(--text-secondary);margin-bottom:18px}
.mf{margin-bottom:12px}
.mf label{font-size:12px;font-weight:500;color:var(--text-secondary);display:block;margin-bottom:5px}
.modal-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s;font-family:'SF Mono','Fira Code',monospace}
.modal-input:focus{border-color:var(--accent)}
.modal-acts{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.mbtn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all .2s}
.mbtn.pri{background:var(--accent);color:#fff}
.mbtn.pri:hover{background:#3d5ce5}
.mbtn.sec{background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border)}
.mbtn.sec:hover{background:var(--bg-tertiary)}
/* Empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-tertiary);gap:12px;padding:40px}
.empty .ei{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;opacity:.6}

.empty .es{font-size:13px}

@media(max-width:768px){
.sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;min-width:280px;transform:translateX(-100%);z-index:200;box-shadow:var(--shadow-md);transition:transform .3s cubic-bezier(.4,0,.2,1)}

.top-bar .top-title{font-size:14px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-topbar{padding:4px}
.model-trigger{padding:5px 10px;font-size:12px}

.chat-area{padding:14px 12px}
.bubble{max-width:88vw;font-size:14px;line-height:1.6}
.empty{padding:0 20px}.ei svg{width:48px;height:48px}.et{font-size:16px}.es{font-size:13px}

.col{min-width:unset;max-width:unset;max-height:50vh}
.col-hdr{font-size:12px;padding:6px 10px}
.col-msgs{font-size:14px}
.col-in{padding:6px}
.col-input{font-size:14px}

}

.code-wrap{position:relative}.code-copy{position:absolute;top:6px;right:6px;padding:3px 8px;border-radius:4px;font-size:11px;color:var(--text-tertiary);background:var(--bg-primary);border:1px solid var(--border);cursor:pointer;opacity:0;transition:opacity .2s}.code-wrap:hover .code-copy{opacity:1}.code-copy:hover{color:var(--accent);border-color:var(--accent)}
.date-sep{padding:8px 12px 4px;font-size:11px;color:var(--text-tertiary);font-weight:500}
.no-result{text-align:center;padding:20px;color:var(--text-tertiary);font-size:13px}
.typing-indicator{display:flex;gap:4px;padding:8px 0}.typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);animation:typing 1.4s infinite}.typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}@keyframes typing{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

.img-preview{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}.img-preview img{height:60px;border-radius:4px}.img-preview button{padding:2px 6px;border-radius:50%;background:var(--bg-tertiary);color:var(--text-secondary);font-size:14px}
/* highlight.js overrides */
.bubble .code-wrap pre{background:var(--bg-tertiary);border:1px solid var(--border);padding:14px 16px;border-radius:var(--radius-sm);overflow-x:auto;margin:10px 0}

.bubble img{max-width:100%;border-radius:var(--radius-sm);margin:8px 0}

<script>
// ===== CUSTOM DIALOG (元宝风格) =====
let _cdlgResolve=null;
function showDialog({title='',defaultVal='',mode='prompt'}){
  return new Promise(resolve=>{
    _cdlgResolve=resolve;
    const bg=document.getElementById('cdlgBg');
    const inp=document.getElementById('cdlgInput');
    const msg=document.getElementById('cdlgMsg');
    const cancelBtn=bg.querySelector('.cdlg-cancel');
    document.getElementById('cdlgTitle').textContent=mode==='prompt'?title:'';
    if(mode==='prompt'){inp.style.display='';msg.style.display='none';inp.value=defaultVal;cancelBtn.style.display='';
    }else{inp.style.display='none';msg.style.display='';msg.innerHTML=title.replace(/\n/g,'<br>');cancelBtn.style.display='none';}
    bg.classList.add('show');
    if(mode==='prompt')setTimeout(()=>inp.focus(),50);
  });
}
function cdlgOk(){
  const bg=document.getElementById('cdlgBg');bg.classList.remove('show');
  const inp=document.getElementById('cdlgInput');
  if(_cdlgResolve){_cdlgResolve(inp.style.display===''?inp.value.trim():true);_cdlgResolve=null;}
}
function cdlgCancel(){
  document.getElementById('cdlgBg').classList.remove('show');
  if(_cdlgResolve){_cdlgResolve(null);_cdlgResolve=null;}
}
document.getElementById('cdlgInput').addEventListener('keydown',e=>{if(e.key==='Enter')cdlgOk();if(e.key==='Escape')cdlgCancel();});

// ===== THEME =====
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('multi_ai_theme',next);
  updateThemeIcon(next);
}
function updateThemeIcon(t){
  const icon=document.getElementById('themeIcon');
  if(t==='dark') icon.innerHTML='<path d="M17 10a7 7 0 01-9.9 6.4A7 7 0 0110 3.6a5.5 5.5 0 007 6.4z"/>';
  else icon.innerHTML='<circle cx="10" cy="10" r="4"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"/>';
  // Sync theme-color meta for mobile status bar
  const meta=document.getElementById('themeColorMeta');
  if(meta)meta.content=t==='dark'?'#1a1a1a':'#ffffff';
  // Sync highlight.js stylesheet
  const hljsLight=document.getElementById('hljs-light');
  const hljsDark=document.getElementById('hljs-dark');
  if(hljsLight)hljsLight.media=t==='dark'?'not all':'all';
  if(hljsDark)hljsDark.media=t==='dark'?'all':'not all';
}
function initTheme(){
  const t=localStorage.getItem('multi_ai_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',t);
  updateThemeIcon(t);
}

function toggleSidebar(){
  state.sidebarCollapsed=!state.sidebarCollapsed;

  document.getElementById('sidebar').classList.toggle('collapsed',state.sidebarCollapsed);
}
function openMobileSidebar(){
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('show');
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}
function filterChats(q){
  const items=document.querySelectorAll('.chat-item');
  let anyVisible=false;
  items.forEach(el=>{
    const title=el.querySelector('.chat-title');
    const show=title&&title.textContent.toLowerCase().includes(q.toLowerCase());
    el.style.display=show?'':'none';
    if(show)anyVisible=true;
  });
  let noRes=document.getElementById('noResult');
  if(!anyVisible&&q){
    if(!noRes){noRes=document.createElement('div');noRes.className='no-result';noRes.id='noResult';noRes.textContent='无匹配对话';document.getElementById('sbList').appendChild(noRes)}
  }else{if(noRes)noRes.remove()}
}

function showKeyModal(){
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('keyInput').value=localStorage.getItem('multi_ai_key')||'';
  document.getElementById('keyInputZhipu').value=localStorage.getItem('multi_ai_key_zhipu')||'';
  document.getElementById('keyInputKimi').value=localStorage.getItem('multi_ai_key_kimi')||'';
  document.getElementById('keyInputSilicon').value=localStorage.getItem('multi_ai_key_silicon')||'';
}
function hideModal(e){
  if(e&&e.target!==document.getElementById('modalBg'))return;
  document.getElementById('modalBg').classList.remove('show');
}
function saveKey(){
  ['keyInput','keyInputZhipu','keyInputKimi','keyInputSilicon'].forEach((id,i)=>{
    const keys=['multi_ai_key','multi_ai_key_zhipu','multi_ai_key_kimi','multi_ai_key_silicon'];
    localStorage.setItem(keys[i],document.getElementById(id).value.replace(/[^\x20-\x7E]/g,'').trim());
  });
  updateKeyStatus();hideModal();
}
function updateKeyStatus(){
  const parts=[];
  if(localStorage.getItem('multi_ai_key'))parts.push('OR✓');
  if(localStorage.getItem('multi_ai_key_zhipu'))parts.push('智谱✓');
  if(localStorage.getItem('multi_ai_key_kimi'))parts.push('Kimi✓');
  if(localStorage.getItem('multi_ai_key_silicon'))parts.push('硅基✓');
  document.getElementById('keyStatus').textContent=parts.length?parts.join(' '):' 未设置';
}
function shareKeys(){
  const keys={or:localStorage.getItem('multi_ai_key')||'',zp:localStorage.getItem('multi_ai_key_zhipu')||'',km:localStorage.getItem('multi_ai_key_kimi')||'',sf:localStorage.getItem('multi_ai_key_silicon')||''};
  if(!keys.or&&!keys.zp&&!keys.km&&!keys.sf){showDialog({title:'没有可分享的 Key，请先配置',mode:'alert'});return}
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(keys))));
  const url=location.origin+location.pathname+'#keys='+encoded;
  navigator.clipboard.writeText(url).then(()=>showDialog({title:'✅ 分享链接已复制到剪贴板\n朋友打开链接即可自动导入配置',mode:'alert'})).catch(()=>{showDialog({title:'复制下方链接发给朋友：',defaultVal:url,mode:'prompt'})});
}
function importKeysFromHash(){
  const hash=location.hash;
  if(!hash.startsWith('#keys='))return;
  try{
    const json=decodeURIComponent(escape(atob(hash.slice(6))));
    const keys=JSON.parse(json);
    let imported=0;
    if(keys.or){localStorage.setItem('multi_ai_key',keys.or);imported++}
    if(keys.zp){localStorage.setItem('multi_ai_key_zhipu',keys.zp);imported++}
    if(keys.km){localStorage.setItem('multi_ai_key_kimi',keys.km);imported++}
    if(keys.sf){localStorage.setItem('multi_ai_key_silicon',keys.sf);imported++}
    if(imported>0){history.replaceState(null,'',location.pathname);updateKeyStatus()}
  }catch(e){}
}

function closeModelPanel(){document.getElementById('modelPanel').classList.remove('show')}
function toggleModel(id){
  const idx=state.selectedModels.indexOf(id);
  if(idx>=0)state.selectedModels.splice(idx,1);else state.selectedModels.push(id);
  openModelPanel();// refresh
  updateModelTrigger();
  renderChatArea();

function updateModelTrigger(){
  const el=document.getElementById('modelTriggerText');
  if(!state.selectedModels.length){el.innerHTML='选择模型';return;}
  const names=state.selectedModels.map(getModelName);
  if(names.length===1)el.innerHTML=names[0];
  else el.innerHTML=`${names[0]} <span class="cnt">+${names.length-1}</span>`;
}
function updateModelSelectorUI(){
  updateModelTrigger();
  // Refresh checkboxes if panel is open
  const panel=document.getElementById('modelPanel');
  if(panel&&panel.style.display!=='none')openModelPanel();
}
function getModelName(id){
  for(const t of MODELS)for(const m of t.models)if(m.id===id)return m.name;
  return id.split('/').pop();
}

function saveChats(){localStorage.setItem('multi_ai_chats',JSON.stringify(state.chats))}
function saveFolders(){localStorage.setItem('multi_ai_folders',JSON.stringify(state.folders))}
function createNewChat(folderId){
  const fid=folderId||null;
  const chat={id:Date.now().toString(),title:'新对话',messages:[],folderId:fid};
  // Add system prompt if folder has one
  if(fid){const folder=state.folders.find(f=>f.id===fid);if(folder&&folder.systemPrompt)chat.messages.push({role:'system',content:folder.systemPrompt,ts:Date.now()})}
  state.chats.unshift(chat);state.currentChatId=chat.id;state.currentFolderId=null;
  saveChats();renderSidebar();renderChatArea();updateTopTitle();
  closeMobileSidebar();
}
function selectChat(id){
  // Save current chat's model selection before switching
  const prevChat=getCurrentChat();
  if(prevChat&&state.selectedModels.length)prevChat.selectedModels=state.selectedModels.slice();
  state.currentChatId=id;state.currentFolderId=null;
  // Restore model selection from the target chat (filter out removed models)
  const chat=getCurrentChat();
  if(chat&&chat.selectedModels&&chat.selectedModels.length){
    state.selectedModels=chat.selectedModels.filter(mid=>VALID_MODEL_IDS.has(mid));
    chat.selectedModels=state.selectedModels.slice();
    updateModelSelectorUI();
  } else if(chat&&chat.messages&&chat.messages.length&&!state.selectedModels.length){
    // Chat has messages but no saved models — infer from messages
    const inferred=new Set();
    chat.messages.forEach(m=>{
      if(m.targetModels)m.targetModels.forEach(mid=>{if(VALID_MODEL_IDS.has(mid))inferred.add(mid)});
      if(m.modelId&&VALID_MODEL_IDS.has(m.modelId))inferred.add(m.modelId);
    });
    if(inferred.size){state.selectedModels=[...inferred];chat.selectedModels=state.selectedModels.slice();updateModelSelectorUI();}
  }
  renderSidebar();renderChatArea();updateTopTitle();
  closeMobileSidebar();
}
function getCurrentChat(){return state.chats.find(c=>c.id===state.currentChatId)}
async function deleteChat(id,e){
  e&&e.stopPropagation();
  const ok=await showDialog({title:'确认删除该对话？',mode:'confirm'});
  if(!ok)return;
  state.chats=state.chats.filter(c=>c.id!==id);
  if(state.currentChatId===id)state.currentChatId=state.chats[0]?.id||null;
  saveChats();renderSidebar();renderChatArea();updateTopTitle();
}
function startEditChat(id,e){
  e&&e.stopPropagation();
  const item=document.querySelector(`.chat-item[data-id="${id}"]`);
  if(!item)return;
  const tEl=item.querySelector('.chat-title');
  if(!tEl)return;
  const cur=tEl.textContent;
  tEl.outerHTML=`<input class="edit-input" value="${cur}" onblur="finishEditChat('${id}',this)" onkeydown="if(event.key==='Enter')this.blur()">`;
  item.querySelector('.edit-input').focus();
}
function finishEditChat(id,input){
  const chat=state.chats.find(c=>c.id===id);
  if(chat&&input.value.trim())chat.title=input.value.trim();
  saveChats();renderSidebar();updateTopTitle();
}
function updateTopTitle(){
  if(state.currentFolderId&&!state.currentChatId){
    const f=state.folders.find(x=>x.id===state.currentFolderId);
    document.getElementById('topTitle').textContent=f?f.name:'Multi AI Studio';return;

  const chat=getCurrentChat();

function handleFolderInputKeyDown(e){
  if(e.isComposing||e.keyCode===229)return;
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFolderMessage()}
}
function sendFolderMessage(){
  const input=document.getElementById('folderInput');
  const text=input.value.trim();if(!text)return;
  const folder=state.folders.find(f=>f.id===state.currentFolderId);if(!folder)return;
  const chat={id:Date.now().toString(),title:text.slice(0,20)+(text.length>20?'...':''),messages:[],folderId:folder.id};
  // Add system prompt if set
  if(folder.systemPrompt){
    chat.messages.push({role:'system',content:folder.systemPrompt,ts:Date.now()});
  }
  chat.messages.push({role:'user',content:text,ts:Date.now()});
  state.chats.unshift(chat);state.currentChatId=chat.id;state.currentFolderId=null;
  saveChats();renderSidebar();
  if(state.selectedModels.length){
    if(state.selectedModels.length===1)streamToModel(state.selectedModels[0],chat,getHistory(chat,state.selectedModels[0]));
    else state.selectedModels.forEach(id=>streamToModel(id,chat,getHistory(chat,id)));
  }
  renderChatArea();updateTopTitle();
}

  // Groups section header
  html+='<div class="grp-title-row hide-c"><span>分组</span><button onclick="createFolder()" title="新建分组">+</button></div>';
  if(!state.groupsCollapsed){
    state.folders.forEach(f=>{
      const chats=state.chats.filter(c=>c.folderId===f.id);
      const isActive=state.currentFolderId===f.id&&!state.currentChatId;
      html+=`<div class="grp-hdr${isActive?' active':''}" onclick="openFolderDetail('${f.id}')">
        <svg viewBox="0 0 16 16"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/><path d="M2 4l2-2h4l2 2"/></svg>
        ${f.name} <span style="font-size:11px;color:var(--text-tertiary)">(${chats.length})</span>
        <div class="grp-acts" onclick="event.stopPropagation()">
          <button onclick="renameFolder('${f.id}')" title="重命名"><svg viewBox="0 0 12 12"><path d="M2 10l6-6 2 2-6 6H2v-2z"/></svg></button>
          <button onclick="deleteFolder('${f.id}')" title="删除"><svg viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6"/></svg></button>
        </div></div>`;
    });
    if(state.folders.length) html+='<div class="collapse-grp-btn hide-c" onclick="toggleGroupsCollapse()"><svg viewBox="0 0 12 12"><path d="M6 2v8M3 7l3 3 3-3"/></svg>收起分组</div>';
  }else{
    html+='<div class="collapse-grp-btn hide-c" onclick="toggleGroupsCollapse()"><svg viewBox="0 0 12 12"><path d="M6 10V2M3 5l3-3 3 3"/></svg>展开分组</div>';
  }
  // Ungrouped chats
  const ungrouped=state.chats.filter(c=>!c.folderId);
  if(ungrouped.length||true){
    html+='<div class="grp-title-row hide-c"><span>聊天</span></div>';
    const now=new Date();const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
    const yesterdayStart=todayStart-86400000;
    let shownToday=false,shownYesterday=false,shownEarlier=false;
    ungrouped.forEach(c=>{
      const msgs=c.messages||[];const lastTs=c.ts||(msgs.length?msgs[msgs.length-1].ts:0)||0;
      if(!lastTs||lastTs>=todayStart){if(!shownToday){html+='<div class="date-sep">今天</div>';shownToday=true}}
      else if(lastTs>=yesterdayStart){if(!shownYesterday){html+='<div class="date-sep">昨天</div>';shownYesterday=true}}
      else{if(!shownEarlier){html+='<div class="date-sep">更早</div>';shownEarlier=true}}
      html+=chatItemHTML(c);
    });
  }
  list.innerHTML=html;
}

// ===== CHAT AREA =====
let _renderPending=false,_streamingModelId=null;

function renderReasoning(reasoning,isStreaming,startTime){
  if(!reasoning)return'';
  if(!isStreaming){
    const sec=startTime?Math.round((Date.now()-startTime)/1000):'';
    return `<div class="thinking-done"><svg viewBox="0 0 14 14" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><circle cx="7" cy="7" r="3"/><circle cx="7" cy="7" r="6" stroke-dasharray="2 2"/></svg> 已深度思考${sec?` ${sec}秒`:''}</div>`;
  }
  return `<div class="thinking-block"><div class="thinking-summary"><svg viewBox="0 0 14 14" style="width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2"><circle cx="7" cy="7" r="3"/><circle cx="7" cy="7" r="6" stroke-dasharray="2 2"/></svg>思考中<div class="dot-anim"><span></span><span></span><span></span></div></div><div class="thinking-body">${renderMd(reasoning)}<span class="cursor"></span></div></div>`;
}

function updateStreamingBubble(modelId){
  const safeId='stream-'+modelId.replace(/[^a-z0-9]/gi,'_');
  const el=document.getElementById(safeId);
  if(el&&state.streaming[modelId]){
    const s=state.streaming[modelId];
    if(s.waiting){
      el.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';
    }else{
      el.innerHTML=renderReasoning(s.reasoning,true,s.startTime)+renderMd(s.text)+(s.text||s.reasoning?'':'')+'<span class="cursor"></span>';
    }
    const parent=el.closest('.col-msgs')||el.closest('.chat-area');
    if(parent)parent.scrollTop=parent.scrollHeight;
    return true;
  }
  return false;
}
function scheduleRender(modelId){
  if(_renderPending)return;_renderPending=true;_streamingModelId=modelId;
  requestAnimationFrame(()=>{_renderPending=false;
    if(_streamingModelId&&updateStreamingBubble(_streamingModelId))return;
    renderChatArea();
  });
}

function renderChatArea(){
  const area=document.getElementById('chatArea');

  // Folder detail view
  if(state.currentFolderId&&!state.currentChatId){
    renderFolderDetail(area);return;
  }
  const chat=getCurrentChat();
  // Try to restore models from chat data if selectedModels is empty
  if(chat&&!state.selectedModels.length){
    if(chat.selectedModels&&chat.selectedModels.length){
      state.selectedModels=chat.selectedModels.filter(id=>VALID_MODEL_IDS.has(id));
      chat.selectedModels=state.selectedModels.slice();
      updateModelSelectorUI();
    } else if(chat.messages&&chat.messages.length){
      // Infer from message targetModels or AI responses
      const inferred=new Set();
      chat.messages.forEach(m=>{
        if(m.targetModels)m.targetModels.forEach(id=>{if(VALID_MODEL_IDS.has(id))inferred.add(id)});
        if(m.modelId&&VALID_MODEL_IDS.has(m.modelId))inferred.add(m.modelId);
      });
      if(inferred.size){state.selectedModels=[...inferred];chat.selectedModels=state.selectedModels.slice();saveChats();updateModelSelectorUI();}
    }
  }

// ===== MARKDOWN (marked.js + highlight.js) =====
(function initMarked(){
  if(typeof marked!=='undefined'){
    const renderer=new marked.Renderer();
    renderer.code=function(text,lang){
      let highlighted=text;
      if(typeof hljs!=='undefined'){
        // marked v15: text may be {text,lang} object
        const codeStr=typeof text==='object'?text.text:text;
        const codeLang=typeof text==='object'?text.lang:lang;
        if(codeLang&&hljs.getLanguage(codeLang)){
          highlighted=hljs.highlight(codeStr,{language:codeLang}).value;
        }else{
          highlighted=hljs.highlightAuto(codeStr).value;
        }
        return `<pre><code class="hljs language-${codeLang||'plaintext'}">${highlighted}</code></pre>`;
      }
      const codeStr2=typeof text==='object'?text.text:text;
      return `<pre><code>${codeStr2}</code></pre>`;
    };
    marked.setOptions({renderer,breaks:true,gfm:true});
  }
})();
function copyCode(btn){const pre=btn.parentElement.querySelector('pre');navigator.clipboard.writeText(pre.textContent);btn.textContent='已复制';setTimeout(()=>btn.textContent='复制',1500)}
// Detect and neutralize hallucinated external links in AI responses
const SUSPECT_LINK_RE=/https?:\/\/(pastebin\.com|gist\.github\.com|drive\.google\.com|docs\.google\.com|bit\.ly|tinyurl\.com|paste\.ee|hastebin\.com|rentry\.co|ghostbin\.com|dpaste\.org|ideone\.com|codeshare\.io|replit\.com\/@)[^\s)"\]<]*/gi;
// Detect "click here for full content" hallucination patterns
const HALLUCINATION_PHRASES_RE=/(\*{0,2}注意\*{0,2}[：:]?\s*).{0,20}(完整[内內]容|完整版|全文|剩余部分).{0,80}(请[点击访问打开]).{0,200}(https?:\/\/[^\s)"\]<]+)/gi;
const TRUNCATION_HALLUCINATION_RE=/(?:(?:由于|因为)(?:篇幅|字数|长度|输出)(?:限制|有限|较长)|(?:以[上下]|剩余|完整|全部)(?:内容|部分|章节).{0,30}(?:请|可以?|点击|访问|查看|前往|获取)).{0,100}(https?:\/\/[^\s)"\]<]+)/gi;
function sanitizeHallucinatedLinks(text){
  // Remove truncation hallucination blocks (entire paragraph containing fake link)
  text=text.replace(TRUNCATION_HALLUCINATION_RE,(match)=>'> ⚠️ ~~[AI 幻觉内容已过滤：声称有外部完整版链接，实际为虚构]~~');
  text=text.replace(HALLUCINATION_PHRASES_RE,(match)=>'> ⚠️ ~~[AI 幻觉内容已过滤：声称有外部完整版链接，实际为虚构]~~');
  // Still catch remaining bare suspect URLs
  return text.replace(SUSPECT_LINK_RE,(url)=>`~~${url}~~ ⚠️`);
}
function renderMd(text){
  if(!text)return'';
  try{
    // Pre-process: strike through likely hallucinated external links
    text=sanitizeHallucinatedLinks(text);
    let html=typeof marked!=='undefined'?marked.parse(text):text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    // Wrap code blocks with copy button
    html=html.replace(/<pre><code([^>]*)>/g,'<div class="code-wrap"><button class="code-copy" onclick="copyCode(this)">复制</button><pre><code$1>');
    html=html.replace(/<\/code><\/pre>/g,'</code></pre></div>');
    return html;
  }catch(e){return text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
}

// ===== SEND =====
function sendMessage(){
  const input=document.getElementById('mainInput');
  let text=input.value.trim();
  if(!text||!state.selectedModels.length)return;
  // Global tools for single model; per-column tools respected in multi-mode
  if(state.selectedModels.length===1){
    if(state.activeTools.length)text=`[${state.activeTools.join(',')}] ${text}`;
  }
  let chat=getCurrentChat();
  // Save model selection to chat for restoration on re-open
  if(chat)chat.selectedModels=state.selectedModels.slice();
  if(!chat){createNewChat();chat=getCurrentChat();chat.selectedModels=state.selectedModels.slice()}
  if(chat.title==='新对话'&&text.length>0)chat.title=text.slice(0,20)+(text.length>20?'...':'');
  const hasImage=!!state.pendingImage;
  const msgContent=hasImage?text:text;
  chat.messages.push({role:'user',content:text,ts:Date.now(),image:hasImage?state.pendingImage:undefined,targetModels:state.selectedModels.slice()});
  saveChats();renderSidebar();
  input.value='';autoResize(input);updateSendBtn();
  state.activeTools=[];renderToolBadges();
  if(hasImage){state.pendingImage=null;clearImage()}
  if(state.selectedModels.length===1){
    streamToModel(state.selectedModels[0],chat,getHistory(chat,state.selectedModels[0]));
  } else {
    state.selectedModels.forEach(id=>{
      // Per-column tools take priority, fallback to global activeTools
      let sendText=text;
      const ct=state.colTools[id];
      if(ct&&ct.length){sendText=`[${ct.join(',')}] ${text}`;state.colTools[id]=[];}
      // Override the last user message content for this model's history
      const hist=getHistory(chat,id);
      if(hist.length&&hist[hist.length-1].role==='user')hist[hist.length-1]={role:'user',content:sendText};
      streamToModel(id,chat,hist);
    });
  }
  renderChatArea();
}
function colSend(modelId,inputEl){
  let text=inputEl.value.trim();if(!text)return;inputEl.value='';
  // Prepend per-column tools if any
  if(state.colTools[modelId]&&state.colTools[modelId].length){
    text=`[${state.colTools[modelId].join(',')}] ${text}`;
    state.colTools[modelId]=[];
  }
  const chat=getCurrentChat();if(!chat)return;
  chat.messages.push({role:'user',content:text,ts:Date.now(),targetModelId:modelId});
  saveChats();
  streamToModel(modelId,chat,getHistory(chat,modelId));
  renderChatArea();
}
function getHistory(chat,modelId){
  const relevant=chat.messages.filter(m=>{
    if(m.role==='system')return true;
    if(m.role==='user'){if(m.targetModelId)return m.targetModelId===modelId;if(m.targetModels)return m.targetModels.includes(modelId);return true;}
    return m.modelId===modelId;
  });
  // Keep system messages + last N exchanges
  const sys=relevant.filter(m=>m.role==='system');
  const rest=relevant.filter(m=>m.role!=='system').slice(-HISTORY_LIMIT*2);
  return [...sys,...rest].map(m=>{
    const role=m.role==='user'?'user':(m.role==='system'?'system':'assistant');
    if(m.image&&role==='user'){
      return {role,content:[{type:'text',text:m.content},{type:'image_url',image_url:{url:m.image}}]};
    }
    return {role,content:m.content};
  });
}

// ===== STREAMING =====
async function streamToModel(modelId,chat,history,retryCount=0,hasFallback=false){
  const effectiveId=getEffectiveModelId(modelId);
  const isZhipu=effectiveId.startsWith('zhipu/');
  const isKimi=effectiveId.startsWith('kimi/');
  const isSilicon=effectiveId.startsWith('silicon/');
  let key,endpoint,headers,bodyModel;

  if(isSilicon){
    key=localStorage.getItem('multi_ai_key_silicon');
    if(!key){addError(chat,modelId,'请先设置硅基流动 API Key');renderChatArea();return}
    endpoint='https://api.siliconflow.cn/v1/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
    const short=effectiveId.replace('silicon/','');
    bodyModel=SILICON_MODEL_MAP[short]||short;
  }else if(isKimi){
    key=localStorage.getItem('multi_ai_key_kimi');
    if(!key){addError(chat,modelId,'请先设置 Kimi API Key');renderChatArea();return}
    endpoint='https://api.moonshot.cn/v1/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
    bodyModel=effectiveId.replace('kimi/','');
  }else if(isZhipu){
    key=localStorage.getItem('multi_ai_key_zhipu');
    if(!key){addError(chat,modelId,'请先设置智谱 API Key');renderChatArea();return}
    endpoint='https://open.bigmodel.cn/api/paas/v4/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
    bodyModel=effectiveId.replace('zhipu/','');
  }else{
    key=localStorage.getItem('multi_ai_key');
    if(!key){addError(chat,modelId,'请先设置 OpenRouter API Key');renderChatArea();return}
    // Use local proxy on Vercel to bypass China GFW blocking openrouter.ai
    const isVercel=location.hostname.includes('vercel.app')||location.hostname.includes('vercel.sh');
    endpoint=isVercel?'/api/proxy':'https://openrouter.ai/api/v1/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`,'HTTP-Referer':location.href};
    bodyModel=effectiveId;
  }

  const controller=new AbortController();
  state.abortControllers[modelId]=controller;
  state.streaming[modelId]={text:'',reasoning:'',done:false,startTime:Date.now(),waiting:true};
  const timeoutId=setTimeout(()=>controller.abort(),TIMEOUT_MS);

  try{
    const res=await fetch(endpoint,{
      method:'POST',headers,
      body:JSON.stringify({model:bodyModel,messages:history,stream:true}),
      signal:controller.signal
    });
    clearTimeout(timeoutId);
    if(!res.ok){
      const errText=await res.text().catch(()=>'');
      if(res.status===429)throw new Error('模型繁忙，请稍后再试');
      throw new Error(`HTTP ${res.status}: ${errText.slice(0,150)}`);
    }
    const reader=res.body.getReader();const decoder=new TextDecoder();let buffer='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();if(data==='[DONE]')break;
        try{
          const j=JSON.parse(data);const delta=j.choices?.[0]?.delta;
          if(delta?.reasoning_content){
            state.streaming[modelId].waiting=false;
            state.streaming[modelId].reasoning+=delta.reasoning_content;
            scheduleRender(modelId);
          }
          if(delta?.content){
            state.streaming[modelId].waiting=false;
            state.streaming[modelId].text+=delta.content;
            scheduleRender(modelId);
          }
        }catch(e){}
      }
    }
    let finalText=state.streaming[modelId].text;
    const finalReasoning=state.streaming[modelId].reasoning;
    const startTime=state.streaming[modelId].startTime;
    delete state.streaming[modelId];delete state.abortControllers[modelId];
    // Detect and sanitize hallucinated external links
    SUSPECT_LINK_RE.lastIndex=0;HALLUCINATION_PHRASES_RE.lastIndex=0;TRUNCATION_HALLUCINATION_RE.lastIndex=0;
    const hadHallucination=SUSPECT_LINK_RE.test(finalText)||HALLUCINATION_PHRASES_RE.test(finalText)||TRUNCATION_HALLUCINATION_RE.test(finalText);
    if(hadHallucination){
      SUSPECT_LINK_RE.lastIndex=0;HALLUCINATION_PHRASES_RE.lastIndex=0;TRUNCATION_HALLUCINATION_RE.lastIndex=0;
      finalText=sanitizeHallucinatedLinks(finalText);
    }
    const msg={role:'assistant',modelId,content:finalText,ts:Date.now()};
    if(finalReasoning){msg.reasoning=finalReasoning;msg.thinkStart=startTime}
    chat.messages.push(msg);saveChats();renderChatArea();
  }catch(err){
    clearTimeout(timeoutId);delete state.streaming[modelId];delete state.abortControllers[modelId];
    if(err.name==='AbortError'){
      if(retryCount<MAX_RETRIES){await sleep(RETRY_DELAY);return streamToModel(modelId,chat,history,retryCount+1,hasFallback)}
      // Retry exhausted, try fallback
      if(!hasFallback&&FALLBACK_MAP[modelId]){
        const fb=FALLBACK_MAP[modelId];
        addError(chat,modelId,`请求超时，模型降级为 ${getModelName(fb)}`);
        renderChatArea();
        return streamToModel(fb,chat,history,0,true);
      }
      addError(chat,modelId,'请求超时（30s）');
    }else if(retryCount<MAX_RETRIES&&!err.message.includes('繁忙')){
      await sleep(RETRY_DELAY);return streamToModel(modelId,chat,history,retryCount+1,hasFallback);
    }else{
      // Retry exhausted, try fallback
      if(!hasFallback&&FALLBACK_MAP[modelId]){
        const fb=FALLBACK_MAP[modelId];
        addError(chat,modelId,`${err.message||'请求失败'}，模型降级为 ${getModelName(fb)}`);
        renderChatArea();
        return streamToModel(fb,chat,history,0,true);
      }
      addError(chat,modelId,err.message||'请求失败');
    }
    renderChatArea();
  }
}
function addError(chat,modelId,errMsg){chat.messages.push({role:'assistant',modelId,content:'',error:errMsg,ts:Date.now()});saveChats()}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ===== EXPORT =====
function exportChat(){
  const chat=getCurrentChat();if(!chat||!chat.messages.length)return;
  let md='# '+chat.title+'\n\n';
  chat.messages.forEach(m=>{
    if(m.role==='system')return;
    const time=m.ts?new Date(m.ts).toLocaleString('zh-CN'):'';
    if(m.role==='user'){md+=`## 用户\n_${time}_\n\n${m.content}\n\n`}
    else{const name=getModelName(m.modelId||'');md+=`## ${name}\n_${time}_\n\n${m.content}\n\n`}
  });
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`${chat.title}_${date}.md`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===== CONTEXT WARNING =====


// ===== MOBILE LONG PRESS =====
let _longPressTimer=null,_longPressTarget=null;
document.addEventListener('touchstart',function(e){
  const msgEl=e.target.closest('.msg.ai');
  if(!msgEl)return;
  _longPressTarget=msgEl;
  _longPressTimer=setTimeout(()=>{
    if(navigator.vibrate)navigator.vibrate(20);
    showMobileMsgMenu(msgEl,e.touches[0]);
    _longPressTimer=null;
  },500);
},{passive:true});
document.addEventListener('touchend',function(){if(_longPressTimer){clearTimeout(_longPressTimer);_longPressTimer=null}},{passive:true});
document.addEventListener('touchmove',function(){if(_longPressTimer){clearTimeout(_longPressTimer);_longPressTimer=null}},{passive:true});

function showMobileMsgMenu(msgEl,touch){
  const actions=msgEl.querySelector('.msg-actions');
  if(!actions)return;
  // Create floating menu
  const menu=document.createElement('div');
  menu.className='ctx-menu show';
  menu.style.cssText=`left:${Math.min(touch.clientX,window.innerWidth-160)}px;top:${Math.max(touch.clientY-100,10)}px`;
  const idx=Array.from(msgEl.parentElement.children).filter(c=>c.classList.contains('msg')).indexOf(msgEl);
  menu.innerHTML=`
    <div class="ctx-item" onclick="copyMsg(${idx});this.parentElement.remove()">📋 复制</div>
    <div class="ctx-item" onclick="regenMsg(${idx});this.parentElement.remove()">🔄 重新生成</div>
    <div class="ctx-item" onclick="likeMsg(${idx});this.parentElement.remove()">👍 喜欢</div>
    <div class="ctx-item" onclick="dislikeMsg(${idx});this.parentElement.remove()">👎 不喜欢</div>`;
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('touchstart',function rm(){menu.remove();document.removeEventListener('touchstart',rm)},{once:true}),50);
}

// ===== SWIPE GESTURE (left edge → open sidebar) =====
let _swipeStartX=0,_swipeStartY=0,_swiping=false;
document.addEventListener('touchstart',function(e){
  if(e.touches[0].clientX<25&&window.innerWidth<=768){
    _swipeStartX=e.touches[0].clientX;_swipeStartY=e.touches[0].clientY;_swiping=true;
  }
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(!_swiping)return;
  const dx=e.touches[0].clientX-_swipeStartX;
  const dy=Math.abs(e.touches[0].clientY-_swipeStartY);
  if(dx>60&&dy<40){openMobileSidebar();_swiping=false}
},{passive:true});
document.addEventListener('touchend',function(){_swiping=false},{passive:true});

// ===== IMAGE COMPRESSION =====
function compressImage(dataUrl,maxWidth=800,quality=0.8){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ===== INIT =====
function init(){
  importKeysFromHash();initTheme();updateKeyStatus();renderSidebar();
  if(state.sidebarCollapsed)document.getElementById('sidebar').classList.add('collapsed');
  if(state.chats.length===0)createNewChat();
  else{state.currentChatId=state.chats[0].id;renderSidebar()}
  renderChatArea();updateModelTrigger();updateTopTitle();updateSendBtn();
  // Register service worker for PWA
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
}
init();
