<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Multi AI Studio</title>
<style>
:root{--bg-primary:#fff;--bg-secondary:#f7f8fa;--bg-tertiary:#f0f1f3;--text-primary:#1a1a1a;--text-secondary:#666;--text-tertiary:#999;--accent:#4f6ef7;--accent-light:#eef1fe;--border:#e8e8e8;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);--success:#52c41a;--warning:#faad14;--error:#ff4d4f}
[data-theme="dark"]{--bg-primary:#1a1a1a;--bg-secondary:#242424;--bg-tertiary:#2d2d2d;--text-primary:#e8e8e8;--text-secondary:#aaa;--text-tertiary:#777;--accent:#6b8aff;--accent-light:#2a2f4a;--border:#3a3a3a;--shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 12px rgba(0,0,0,.3);--success:#52c41a;--warning:#faad14;--error:#ff4d4f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;font-size:15px;line-height:1.7;color:var(--text-primary);background:var(--bg-primary);height:100vh;overflow:hidden;transition:background .3s,color .3s}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
.app{display:flex;height:100vh}
/* Sidebar */
.sidebar{width:260px;min-width:260px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1),width .3s,min-width .3s;overflow:hidden;z-index:100}
.sidebar.collapsed{width:0;min-width:0;border-right:none;transform:translateX(-260px)}
.sidebar.collapsed .hide-c{display:none}
.sidebar.collapsed .show-c{display:flex!important}
.show-c{display:none!important}
.sb-head{padding:14px 16px;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;white-space:nowrap}
.brand-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-new{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--accent);color:#fff;border-radius:var(--radius-md);font-size:13px;font-weight:500;transition:all .2s;width:calc(100% - 28px);justify-content:center;margin:0 14px 10px}
.btn-new:hover{background:#3d5ce5;box-shadow:var(--shadow-sm)}
.btn-new svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sidebar.collapsed .btn-new{display:none}
.sidebar.collapsed .btn-new .btn-text{display:none}
.sb-search{margin:0 14px 10px;position:relative}
.sb-search input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s}
.sb-search input:focus{border-color:var(--accent)}
.sb-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text-tertiary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px;scrollbar-width:thin}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.grp-title-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;margin-top:8px}
.grp-title-row span{font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:.5px;text-transform:uppercase}
.grp-title-row button{padding:2px 6px;border-radius:4px;color:var(--text-tertiary);transition:all .2s;font-size:14px}
.grp-title-row button:hover{color:var(--accent);background:var(--accent-light)}
.grp-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:background .15s;user-select:none}
.grp-hdr:hover{background:var(--bg-tertiary)}
.grp-hdr svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.grp-hdr.collapsed svg.arrow{transform:rotate(-90deg)}
.grp-acts{margin-left:auto;display:none;gap:2px}
.grp-hdr:hover .grp-acts{display:flex}
.grp-acts button{padding:3px;border-radius:4px;color:var(--text-tertiary);transition:all .2s}
.grp-acts button:hover{color:var(--accent);background:var(--accent-light)}
.grp-acts button svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.grp-body{overflow:hidden;transition:max-height .3s;padding-left:8px}
.grp-body.collapsed{max-height:0!important}
.chat-item{display:flex;align-items:center;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;margin-bottom:2px}
.chat-item:hover{background:var(--bg-tertiary)}
.chat-item.active{background:var(--accent-light);color:var(--accent)}
.chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.chat-acts{display:none;gap:2px;margin-left:6px}
.chat-item:hover .chat-acts{display:flex}
.chat-acts button{padding:3px;border-radius:4px;color:var(--text-tertiary);transition:all .2s}
.chat-acts button:hover{color:var(--error)}
.chat-acts button svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.edit-input{flex:1;background:var(--bg-primary);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--text-primary);outline:none}
.sb-foot{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.sb-foot-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);transition:background .15s;cursor:pointer}
.sb-foot-item:hover{background:var(--bg-tertiary)}
.sb-foot-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sb-foot-item .lbl{flex:1;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .sb-foot-item .lbl,.sidebar.collapsed .sb-foot-item .kst{display:none}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.top-bar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg-primary);display:flex;align-items:center;gap:10px}
.top-bar svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-hamburger{display:none;padding:6px;border-radius:var(--radius-sm);color:var(--text-secondary)}
.btn-hamburger:hover{background:var(--bg-tertiary)}
.btn-sidebar-toggle{padding:6px;border-radius:var(--radius-sm);color:var(--text-tertiary);transition:all .2s}
.btn-sidebar-toggle:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.btn-topbar{padding:6px;border-radius:var(--radius-sm);color:var(--text-secondary);transition:all .2s}
.btn-topbar:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.btn-topbar svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.top-title{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-trigger{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all .2s}
.model-trigger:hover{border-color:var(--accent);color:var(--accent)}
.model-trigger .cnt{background:var(--accent);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;font-weight:600}
/* Model Panel */
.model-panel{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center}
.model-panel.show{display:flex}
.model-panel-bg{position:absolute;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
.model-panel-body{position:relative;background:var(--bg-primary);border-radius:var(--radius-lg);width:100%;max-width:580px;max-height:70vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-md);animation:fadeScale .2s ease}
@keyframes fadeScale{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:768px){.model-panel{align-items:flex-end}.model-panel-body{border-radius:var(--radius-lg) var(--radius-lg) 0 0;max-width:100%;animation:slideUp .25s ease}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mp-hdr h3{font-size:16px;font-weight:600}
.mp-close{padding:6px;border-radius:var(--radius-sm);color:var(--text-tertiary);transition:all .2s}
.mp-close:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.mp-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tier{margin-bottom:14px}.tier:last-child{margin-bottom:0}
.tier-label{font-size:12px;font-weight:600;color:var(--text-tertiary);margin-bottom:6px}
.tier-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text-secondary);background:var(--bg-primary);user-select:none;display:flex;align-items:center;gap:4px}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.chip.sel{border-color:var(--accent);background:var(--accent);color:#fff}
.chip .prov{font-size:10px;opacity:.7}
/* Chat Area */
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;scrollbar-width:thin}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
.chat-wrap{width:100%;max-width:800px}
.msg{margin-bottom:20px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{display:flex;justify-content:flex-end}
.msg.ai{display:flex;flex-direction:column;align-items:flex-start}
.bubble{padding:12px 18px;border-radius:var(--radius-lg);line-height:1.7;word-break:break-word;max-width:min(720px,85vw)}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--bg-secondary);color:var(--text-primary);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg .mname{font-size:12px;color:var(--text-tertiary);margin-bottom:4px;font-weight:500}
.bubble code{background:rgba(0,0,0,.06);padding:2px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono','Fira Code',monospace}
.bubble pre{background:var(--bg-tertiary);padding:12px 14px;border-radius:var(--radius-sm);overflow-x:auto;margin:8px 0;font-size:13px;font-family:'SF Mono','Fira Code',monospace;border:1px solid var(--border)}
[data-theme="dark"] .bubble code{background:rgba(255,255,255,.08)}
.bubble ul,.bubble ol{padding-left:20px;margin:8px 0}
.bubble li{margin:4px 0;line-height:1.7}
.bubble strong{font-weight:600}
.bubble h1,.bubble h2,.bubble h3{margin:12px 0 6px;line-height:1.4}
.bubble h1{font-size:18px}.bubble h2{font-size:16px}.bubble h3{font-size:15px}
.bubble p{margin:6px 0}
.bubble blockquote{border-left:3px solid var(--accent);padding:6px 12px;margin:8px 0;color:var(--text-secondary);background:var(--bg-tertiary);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.bubble table{border-collapse:collapse;margin:8px 0;font-size:13px;width:100%}
.bubble th,.bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.bubble th{background:var(--bg-tertiary);font-weight:600}
/* Message Actions */
.msg-actions{display:flex;gap:2px;margin-top:6px;opacity:0;transition:opacity .2s}
.msg.ai:hover .msg-actions{opacity:1}
.msg-act{padding:5px 7px;border-radius:6px;color:var(--text-tertiary);transition:all .15s;display:flex;align-items:center;gap:4px;font-size:12px}
.msg-act:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.msg-act.liked{color:var(--success)}
.msg-act.disliked{color:var(--error)}
.msg-act svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Thinking */
.thinking-block{margin:0 0 10px;border-radius:var(--radius-sm);overflow:hidden}
.thinking-summary{display:flex;align-items:center;gap:6px;padding:8px 12px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-radius:var(--radius-sm);transition:background .2s;user-select:none}
.thinking-summary:hover{background:var(--bg-tertiary)}
.thinking-summary svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dot-anim{display:inline-flex;gap:3px;margin-left:4px}
.dot-anim span{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:dotP 1.4s infinite}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes dotP{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.thinking-body{padding:10px 14px;font-size:13px;color:var(--text-secondary);max-height:200px;overflow-y:auto;background:var(--bg-tertiary);border-radius:var(--radius-sm);margin-top:4px;border:1px solid var(--border);opacity:.85}
.thinking-done{font-size:12px;color:var(--text-tertiary);padding:4px 10px;background:var(--bg-tertiary);border-radius:14px;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
.cursor{display:inline-block;width:2px;height:16px;background:var(--accent);margin-left:2px;animation:blink 1s infinite;vertical-align:middle}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
/* Multi Column */
.cols{display:flex;gap:16px;flex:1;overflow-x:auto;padding:20px;width:100%}
.col{flex:1;min-width:300px;max-width:520px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;box-shadow:var(--shadow-sm)}
.col-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.col-hdr .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.col-msgs{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin}
.col-msgs::-webkit-scrollbar{width:4px}
.col-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.col-in{padding:10px;border-top:1px solid var(--border)}
.col-input-wrap{display:flex;gap:8px;align-items:flex-end}
.col-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s}
.col-input:focus{border-color:var(--accent)}
.col-send{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.col-send:hover{background:#3d5ce5}
.col-send svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.col-tools{display:flex;gap:4px;margin-top:6px}
.col-tbtn{padding:4px;border-radius:4px;color:var(--text-tertiary);transition:all .2s}
.col-tbtn:hover{color:var(--accent);background:var(--accent-light)}
.col-tbtn.active{color:var(--accent)}
.col-tbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Input Area */
.input-area{padding:14px 24px 20px;background:var(--bg-primary);border-top:1px solid var(--border)}
.input-wrap{max-width:800px;margin:0 auto;position:relative}
.input-box{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;transition:border-color .2s,box-shadow .2s}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,.06)}
#mainInput{width:100%;border:none;background:none;resize:none;font-size:15px;line-height:1.6;color:var(--text-primary);outline:none;min-height:26px;max-height:150px;font-family:inherit}
#mainInput::placeholder{color:var(--text-tertiary)}
.input-toolbar{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.itb-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:18px;font-size:13px;color:var(--text-secondary);transition:all .2s;user-select:none}
.itb-btn:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.itb-btn.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.itb-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.itb-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.send-btn{width:34px;height:34px;background:var(--bg-tertiary);color:var(--text-tertiary);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.send-btn.active{background:var(--accent);color:#fff}
.send-btn.active:hover{background:#3d5ce5;transform:scale(1.05)}
.send-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.tool-menu{position:absolute;bottom:100%;left:60px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-md);padding:6px;display:none;min-width:160px;z-index:200;margin-bottom:8px}
.tool-menu.show{display:block;animation:menuIn .15s ease}
@keyframes menuIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.tm-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;transition:background .15s}
.tm-item:hover{background:var(--accent-light)}
.tm-item svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tool-badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--accent-light);border:1px solid var(--accent);border-radius:14px;font-size:12px;color:var(--accent);font-weight:500}
.tbadge .rx{cursor:pointer;font-size:14px;line-height:1;opacity:.6}
.tbadge .rx:hover{opacity:1}
.err{color:var(--error);font-size:12px;margin-top:4px;padding:3px 8px;background:rgba(255,77,79,.05);border-radius:4px}
/* Context Menu */
.ctx-menu{position:fixed;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);padding:4px;z-index:1000;min-width:150px;display:none}
.ctx-menu.show{display:block;animation:menuIn .15s ease}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:13px;transition:background .15s;cursor:pointer}
.ctx-item:hover{background:var(--accent-light)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:500}
.modal-bg.show{display:flex}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg);padding:28px;width:420px;max-width:90vw;box-shadow:var(--shadow-md);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h2{font-size:17px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.modal h2 svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.modal p{font-size:13px;color:var(--text-secondary);margin-bottom:18px}
.mf{margin-bottom:12px}
.mf label{font-size:12px;font-weight:500;color:var(--text-secondary);display:block;margin-bottom:5px}
.modal-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s;font-family:'SF Mono','Fira Code',monospace}
.modal-input:focus{border-color:var(--accent)}
.modal-acts{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.mbtn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all .2s}
.mbtn.pri{background:var(--accent);color:#fff}
.mbtn.pri:hover{background:#3d5ce5}
.mbtn.sec{background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border)}
.mbtn.sec:hover{background:var(--bg-tertiary)}
/* Empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-tertiary);gap:12px;padding:40px}
.empty .ei{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;opacity:.6}
.empty .ei svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty .et{font-size:15px;font-weight:500;color:var(--text-secondary)}
.empty .es{font-size:13px}
/* Mobile */
@media(max-width:768px){
.sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;min-width:280px;transform:translateX(-100%);z-index:200;box-shadow:var(--shadow-md);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar.mobile-open{transform:translateX(0)!important}
.sidebar.collapsed{transform:translateX(-100%)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:199;display:none;transition:background .3s}
.sidebar-overlay.show{display:block;background:rgba(0,0,0,.3)}
.btn-hamburger{display:flex}
.btn-sidebar-toggle{display:none}
.chat-area{padding:16px}
.bubble{max-width:85vw}
.input-area{padding:10px 14px 16px}
.cols{flex-direction:column;padding:14px}
.col{min-width:unset;max-width:unset}
.msg-actions{opacity:1}
}
@media(min-width:769px){.btn-hamburger{display:none}.sidebar-overlay{display:none!important}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="brand hide-c"><div class="brand-icon"><svg viewBox="0 0 20 20"><path d="M10 3L3 7v6l7 4 7-4V7l-7-4z"/><path d="M10 11l7-4M10 11v8M10 11L3 7"/></svg></div><span>Multi AI</span></div>
  </div>
  <button class="btn-new hide-c" onclick="createNewChat()"><svg viewBox="0 0 20 20"><path d="M10 4v12M4 10h12"/></svg><span class="btn-text">新建对话</span></button>
  <button class="btn-new show-c" onclick="createNewChat()" title="新建对话"><svg viewBox="0 0 20 20"><path d="M10 4v12M4 10h12"/></svg></button>
  <div class="sb-search hide-c"><svg viewBox="0 0 20 20"><circle cx="9" cy="9" r="5"/><path d="M14 14l3 3"/></svg><input placeholder="搜索对话..." oninput="filterChats(this.value)"></div>
  <div class="sb-list" id="sbList"></div>
  <div class="sb-foot">
    <div class="sb-foot-item hide-c" onclick="toggleSidebar()"><svg viewBox="0 0 20 20"><path d="M13 4l-6 6 6 6"/><path d="M7 4l-6 6 6 6" opacity=".4"/></svg><span class="lbl">收起侧栏</span></div>
    <div class="sb-foot-item show-c" onclick="toggleSidebar()" title="展开侧栏" style="justify-content:center"><svg viewBox="0 0 20 20"><path d="M7 4l6 6-6 6"/><path d="M13 4l6 6-6 6" opacity=".4"/></svg></div>
    <div class="sb-foot-item" onclick="toggleTheme()"><svg id="themeIcon" viewBox="0 0 20 20"><circle cx="10" cy="10" r="4"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"/></svg><span class="lbl">切换主题</span></div>
    <div class="sb-foot-item" onclick="showKeyModal()"><svg viewBox="0 0 20 20"><path d="M15 7a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M9 10l-6 6v2h2l6-6"/></svg><span class="lbl">API Key</span><span class="kst" id="keyStatus" style="font-size:11px;color:var(--text-tertiary)">未设置</span></div>
  </div>
</aside>
<main class="main">
  <div class="top-bar">
    <button class="btn-hamburger" onclick="openMobileSidebar()"><svg viewBox="0 0 20 20"><path d="M3 5h14M3 10h14M3 15h14"/></svg></button>
    <button class="btn-sidebar-toggle" onclick="toggleSidebar()" title="切换侧栏"><svg viewBox="0 0 20 20" id="sidebarToggleIcon"><path d="M4 4h5v5H4zM11 4h5v5h-5zM4 11h5v5H4z"/><path d="M11 11h5v5h-5z" stroke-dasharray="2 1"/></svg></button>
    <button class="btn-topbar" onclick="createNewChat()" title="新建对话"><svg viewBox="0 0 20 20"><path d="M10 4v12M4 10h12"/></svg></button>
    <span class="top-title" id="topTitle">Multi AI Studio</span>
    <button class="model-trigger" onclick="openModelPanel()"><svg viewBox="0 0 20 20" style="width:14px;height:14px"><path d="M3 3h6v6H3zM11 3h6v6h-6zM3 11h6v6H3zM11 11h6v6h-6z"/></svg><span id="modelTriggerText">选择模型</span></button>
  </div>
  <div class="chat-area" id="chatArea"><div class="empty"><div class="ei"><svg viewBox="0 0 24 24"><path d="M12 3L3 7v6l9 5 9-5V7l-9-4z"/><path d="M12 12l9-5M12 12v10M12 12L3 7"/></svg></div><div class="et">选择模型，开始对话</div><div class="es">支持多模型并排对比 · 深度思考</div></div></div>
  <div class="input-area">
    <div class="input-wrap">
      <div class="tool-badges" id="toolBadges"></div>
      <div class="tool-menu" id="toolMenu">
        <div class="tm-item" onclick="toggleTool('联网搜索')"><svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7"/><path d="M3 10h14M10 3c-2 2.5-2 11 0 14M10 3c2 2.5 2 11 0 14"/></svg>联网搜索</div>
        <div class="tm-item" onclick="toggleTool('写作')"><svg viewBox="0 0 20 20"><path d="M3 17h14M5 13l8-8 2 2-8 8H5v-2z"/></svg>写作</div>
        <div class="tm-item" onclick="toggleTool('编程')"><svg viewBox="0 0 20 20"><path d="M6 7l-3 3 3 3M14 7l3 3-3 3M11 5l-2 10"/></svg>编程</div>
        <div class="tm-item" onclick="toggleTool('解题')"><svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7"/><path d="M8 8a2.5 2.5 0 013 2.5c0 1.5-1 2-1 3M10 15v.5"/></svg>解题</div>
      </div>
      <div class="input-box">
        <textarea id="mainInput" placeholder="输入消息..." rows="1" onkeydown="handleInputKeyDown(event)" onkeyup="handleInputKeyUp(event)" oninput="autoResize(this);updateSendBtn()"></textarea>
        <div class="input-toolbar">
          <button class="itb-btn" id="deepThinkBtn" onclick="toggleDeepThink()"><svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3"/><circle cx="10" cy="10" r="7" stroke-dasharray="3 3"/><path d="M10 3v2M10 15v2M3 10h2M15 10h2"/></svg><span class="hide-c">深度思考</span></button>
          <button class="itb-btn" onclick="toggleToolMenu(event)"><svg viewBox="0 0 20 20"><path d="M5 3h10v2H5zM4 5h12v12a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/><path d="M8 9h4M8 12h4"/></svg><span class="hide-c">工具</span><svg viewBox="0 0 12 12" style="width:10px;height:10px;margin-left:2px"><path d="M3 5l3 3 3-3"/></svg></button>
          <div class="itb-right"><button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 20 20"><path d="M10 16V4M10 4l-5 5M10 4l5 5"/></svg></button></div>
        </div>
      </div>
    </div>
  </div>
</main>
</div>
<!-- Model Panel -->
<div class="model-panel" id="modelPanel"><div class="model-panel-bg" onclick="closeModelPanel()"></div><div class="model-panel-body" id="modelPanelBody"></div></div>
<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu"></div>
<!-- Key Modal -->
<div class="modal-bg" id="modalBg" onclick="hideModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2><svg viewBox="0 0 20 20"><path d="M15 7a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M9 10l-6 6v2h2l6-6"/></svg>API Key 配置</h2>
    <p>分别设置各平台的 API Key</p>
    <div class="mf"><label>OpenRouter Key</label><input class="modal-input" id="keyInput" placeholder="sk-or-v1-..."></div>
    <div class="mf"><label>智谱 AI Key</label><input class="modal-input" id="keyInputZhipu" placeholder="智谱 API Key..."></div>
    <div class="mf"><label>Kimi / 月之暗面 Key</label><input class="modal-input" id="keyInputKimi" placeholder="Kimi API Key..."></div>
    <div class="mf"><label>硅基流动 Key</label><input class="modal-input" id="keyInputSilicon" placeholder="硅基流动 API Key..."></div>
    <div class="modal-acts"><button class="mbtn sec" onclick="hideModal()">取消</button><button class="mbtn pri" onclick="saveKey()">保存</button></div>
  </div>
</div>
<script>
// ===== MODEL DATA =====
const MODELS=[
  {tier:'🧠 推理能力强',models:[
    {id:'silicon/DeepSeek-R1',name:'DeepSeek R1',provider:'硅基'},
    {id:'silicon/Qwen3-32B',name:'Qwen3 32B',provider:'硅基'},
    {id:'kimi/moonshot-v1-32k',name:'Kimi 32K',provider:'Kimi'}
  ]},
  {tier:'⚡ 速度快',models:[
    {id:'silicon/DeepSeek-V4-Flash',name:'DeepSeek V4 Flash',provider:'硅基'},
    {id:'silicon/DeepSeek-V3',name:'DeepSeek V3',provider:'硅基'},
    {id:'silicon/Qwen3-30B-A3B',name:'Qwen3 30B-A3B',provider:'硅基'},
    {id:'zhipu/glm-4-flash',name:'GLM-4 Flash',provider:'智谱'}
  ]},
  {tier:'📝 中文写作',models:[
    {id:'silicon/DeepSeek-V3',name:'DeepSeek V3',provider:'硅基'},
    {id:'silicon/Qwen3-32B',name:'Qwen3 32B',provider:'硅基'},
    {id:'zhipu/glm-4-flash',name:'GLM-4 Flash',provider:'智谱'},
    {id:'kimi/moonshot-v1-8k',name:'Kimi 8K',provider:'Kimi'}
  ]},
  {tier:'🌐 英文/代码',models:[
    {id:'silicon/DeepSeek-V3',name:'DeepSeek V3',provider:'硅基'},
    {id:'silicon/DeepSeek-R1',name:'DeepSeek R1',provider:'硅基'}
  ]},
  {tier:'🆓 完全免费',models:[
    {id:'zhipu/glm-4-flash',name:'GLM-4 Flash',provider:'智谱'},
    {id:'zhipu/glm-4.7-flash',name:'GLM-4.7 Flash',provider:'智谱'},
    {id:'kimi/moonshot-v1-8k',name:'Kimi 8K',provider:'Kimi'},
    {id:'kimi/moonshot-v1-32k',name:'Kimi 32K',provider:'Kimi'}
  ]}
];

// Deep think model mapping
const DEEP_THINK_MAP={
  'silicon/DeepSeek-V3':'silicon/DeepSeek-R1',
  'silicon/DeepSeek-V4-Flash':'silicon/DeepSeek-R1',
  'silicon/Qwen3-32B':'silicon/DeepSeek-R1',
  'silicon/Qwen3-30B-A3B':'silicon/DeepSeek-R1',
  'zhipu/glm-4-flash':'zhipu/glm-4-flash',
  'zhipu/glm-4.7-flash':'zhipu/glm-4.7-flash',
  'kimi/moonshot-v1-8k':'kimi/moonshot-v1-8k',
  'kimi/moonshot-v1-32k':'kimi/moonshot-v1-32k'
};

const SILICON_MODEL_MAP={
  'DeepSeek-V3':'deepseek-ai/DeepSeek-V3',
  'DeepSeek-R1':'deepseek-ai/DeepSeek-R1',
  'Qwen3-32B':'Qwen/Qwen3-32B',
  'Qwen3-30B-A3B':'Qwen/Qwen3-30B-A3B-Instruct-2507',
  'DeepSeek-V4-Flash':'deepseek-ai/DeepSeek-V4-Flash'
};

const MAX_RETRIES=2,RETRY_DELAY=1500,TIMEOUT_MS=30000,HISTORY_LIMIT=10;

let state={
  chats:JSON.parse(localStorage.getItem('multi_ai_chats')||'[]'),
  folders:JSON.parse(localStorage.getItem('multi_ai_folders')||'[]'),
  currentChatId:null,
  selectedModels:[],
  activeTools:[],
  deepThink:false,
  abortControllers:{},
  streaming:{},
  sidebarCollapsed:localStorage.getItem('multi_ai_sidebar_collapsed')==='true'
};

// ===== THEME =====
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('multi_ai_theme',next);
  updateThemeIcon(next);
}
function updateThemeIcon(t){
  const icon=document.getElementById('themeIcon');
  if(t==='dark') icon.innerHTML='<path d="M17 10a7 7 0 01-9.9 6.4A7 7 0 0110 3.6a5.5 5.5 0 007 6.4z"/>';
  else icon.innerHTML='<circle cx="10" cy="10" r="4"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"/>';
}
function initTheme(){
  const t=localStorage.getItem('multi_ai_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',t);
  updateThemeIcon(t);
}

// ===== SIDEBAR =====
function toggleSidebar(){
  state.sidebarCollapsed=!state.sidebarCollapsed;
  localStorage.setItem('multi_ai_sidebar_collapsed',state.sidebarCollapsed);
  document.getElementById('sidebar').classList.toggle('collapsed',state.sidebarCollapsed);
}
function openMobileSidebar(){
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('show');
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}
function filterChats(q){
  const items=document.querySelectorAll('.chat-item');
  items.forEach(el=>{
    const title=el.querySelector('.chat-title');
    if(title) el.style.display=title.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// ===== API KEY =====
function showKeyModal(){
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('keyInput').value=localStorage.getItem('multi_ai_key')||'';
  document.getElementById('keyInputZhipu').value=localStorage.getItem('multi_ai_key_zhipu')||'';
  document.getElementById('keyInputKimi').value=localStorage.getItem('multi_ai_key_kimi')||'';
  document.getElementById('keyInputSilicon').value=localStorage.getItem('multi_ai_key_silicon')||'';
}
function hideModal(e){
  if(e&&e.target!==document.getElementById('modalBg'))return;
  document.getElementById('modalBg').classList.remove('show');
}
function saveKey(){
  ['keyInput','keyInputZhipu','keyInputKimi','keyInputSilicon'].forEach((id,i)=>{
    const keys=['multi_ai_key','multi_ai_key_zhipu','multi_ai_key_kimi','multi_ai_key_silicon'];
    localStorage.setItem(keys[i],document.getElementById(id).value.replace(/[^\x20-\x7E]/g,'').trim());
  });
  updateKeyStatus();hideModal();
}
function updateKeyStatus(){
  const parts=[];
  if(localStorage.getItem('multi_ai_key'))parts.push('OR✓');
  if(localStorage.getItem('multi_ai_key_zhipu'))parts.push('智谱✓');
  if(localStorage.getItem('multi_ai_key_kimi'))parts.push('Kimi✓');
  if(localStorage.getItem('multi_ai_key_silicon'))parts.push('硅基✓');
  document.getElementById('keyStatus').textContent=parts.length?parts.join(' '):' 未设置';
}

// ===== MODEL PANEL =====
function openModelPanel(){
  const panel=document.getElementById('modelPanel');
  const body=document.getElementById('modelPanelBody');
  let html='<div class="mp-hdr"><h3>选择模型</h3><button class="mp-close" onclick="closeModelPanel()"><svg viewBox="0 0 20 20"><path d="M5 5l10 10M15 5L5 15"/></svg></button></div>';
  MODELS.forEach(tier=>{
    html+=`<div class="tier"><div class="tier-label">${tier.tier}</div><div class="tier-chips">`;
    tier.models.forEach(m=>{
      const sel=state.selectedModels.includes(m.id);
      html+=`<div class="chip${sel?' sel':''}" onclick="toggleModel('${m.id}')">${sel?'✓ ':''}${m.name}<span class="prov">${m.provider}</span></div>`;
    });
    html+='</div></div>';
  });
  body.innerHTML=html;
  panel.classList.add('show');
}
function closeModelPanel(){document.getElementById('modelPanel').classList.remove('show')}
function toggleModel(id){
  const idx=state.selectedModels.indexOf(id);
  if(idx>=0)state.selectedModels.splice(idx,1);else state.selectedModels.push(id);
  openModelPanel();// refresh
  updateModelTrigger();
  renderChatArea();
}
function updateModelTrigger(){
  const el=document.getElementById('modelTriggerText');
  if(!state.selectedModels.length){el.innerHTML='选择模型';return;}
  const names=state.selectedModels.map(getModelName);
  if(names.length===1)el.innerHTML=names[0];
  else el.innerHTML=`${names[0]} <span class="cnt">+${names.length-1}</span>`;
}
function getModelName(id){
  for(const t of MODELS)for(const m of t.models)if(m.id===id)return m.name;
  return id.split('/').pop();
}

// ===== DEEP THINK =====
function toggleDeepThink(){
  state.deepThink=!state.deepThink;
  document.getElementById('deepThinkBtn').classList.toggle('active',state.deepThink);
}
if(!state.colDeepThink)state.colDeepThink={};
function toggleColDeepThink(modelId){
  if(!state.colDeepThink)state.colDeepThink={};
  state.colDeepThink[modelId]=!state.colDeepThink[modelId];
  renderChatArea();
}
function getEffectiveModelId(modelId){
  // Column-specific deep think takes priority
  if(state.colDeepThink&&state.colDeepThink[modelId])return DEEP_THINK_MAP[modelId]||modelId;
  if(!state.deepThink)return modelId;
  return DEEP_THINK_MAP[modelId]||modelId;
}

// ===== MSG ACTIONS =====
function copyMsg(idx){
  const chat=getCurrentChat();if(!chat)return;
  const m=chat.messages[idx];if(!m)return;
  navigator.clipboard.writeText(m.content).then(()=>{
    // brief visual feedback
    const btns=document.querySelectorAll('.msg-act');
    // find corresponding copy btn by DOM position - simple approach
  }).catch(()=>{});
}
function regenMsg(idx){
  const chat=getCurrentChat();if(!chat)return;
  const m=chat.messages[idx];if(!m||m.role!=='assistant')return;
  const modelId=m.modelId;
  // Remove this message and regenerate
  chat.messages.splice(idx,1);saveChats();
  streamToModel(modelId,chat,getHistory(chat,modelId));
  renderChatArea();
}
function likeMsg(idx,btn){btn.classList.toggle('liked');btn.closest('.msg-actions').querySelector('.msg-act.disliked')?.classList.remove('disliked')}
function dislikeMsg(idx,btn){btn.classList.toggle('disliked');btn.closest('.msg-actions').querySelector('.msg-act.liked')?.classList.remove('liked')}

// ===== CHATS =====
function saveChats(){localStorage.setItem('multi_ai_chats',JSON.stringify(state.chats))}
function saveFolders(){localStorage.setItem('multi_ai_folders',JSON.stringify(state.folders))}
function createNewChat(){
  const chat={id:Date.now().toString(),title:'新对话',messages:[],folderId:null};
  state.chats.unshift(chat);state.currentChatId=chat.id;
  saveChats();renderSidebar();renderChatArea();updateTopTitle();
  closeMobileSidebar();
}
function selectChat(id){
  state.currentChatId=id;renderSidebar();renderChatArea();updateTopTitle();
  closeMobileSidebar();
}
function getCurrentChat(){return state.chats.find(c=>c.id===state.currentChatId)}
function deleteChat(id,e){
  e&&e.stopPropagation();if(!confirm('确认删除？'))return;
  state.chats=state.chats.filter(c=>c.id!==id);
  if(state.currentChatId===id)state.currentChatId=state.chats[0]?.id||null;
  saveChats();renderSidebar();renderChatArea();updateTopTitle();
}
function startEditChat(id,e){
  e&&e.stopPropagation();
  const item=document.querySelector(`.chat-item[data-id="${id}"]`);
  const tEl=item.querySelector('.chat-title');
  const cur=tEl.textContent;
  tEl.outerHTML=`<input class="edit-input" value="${cur}" onblur="finishEditChat('${id}',this)" onkeydown="if(event.key==='Enter')this.blur()">`;
  item.querySelector('.edit-input').focus();
}
function finishEditChat(id,input){
  const chat=state.chats.find(c=>c.id===id);
  if(chat&&input.value.trim())chat.title=input.value.trim();
  saveChats();renderSidebar();updateTopTitle();
}
function updateTopTitle(){
  const chat=getCurrentChat();
  document.getElementById('topTitle').textContent=chat?chat.title:'Multi AI Studio';
}

// ===== FOLDERS / GROUPS =====
function createFolder(){
  const name=prompt('分组名称：');if(!name)return;
  state.folders.push({id:Date.now().toString(),name,collapsed:false});
  saveFolders();renderSidebar();
}
function renameFolder(id){
  const f=state.folders.find(x=>x.id===id);
  const name=prompt('重命名分组：',f.name);
  if(name){f.name=name;saveFolders();renderSidebar();}
}
function deleteFolder(id){
  if(!confirm('删除分组？（对话会移出）'))return;
  state.chats.forEach(c=>{if(c.folderId===id)c.folderId=null});
  state.folders=state.folders.filter(f=>f.id!==id);
  saveFolders();saveChats();renderSidebar();
}
function toggleFolderCollapse(id){
  const f=state.folders.find(x=>x.id===id);f.collapsed=!f.collapsed;
  saveFolders();renderSidebar();
}

// ===== CONTEXT MENU =====
function showCtxMenu(e,chatId){
  e.preventDefault();const menu=document.getElementById('ctxMenu');
  const folders=state.folders.map(f=>`<div class="ctx-item" onclick="moveChatToFolder('${chatId}','${f.id}')">📁 ${f.name}</div>`).join('');
  menu.innerHTML=`<div class="ctx-item" onclick="moveChatToFolder('${chatId}',null)">移到根目录</div>${folders}`;
  menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';menu.classList.add('show');
  setTimeout(()=>document.addEventListener('click',hideCtx,{once:true}),0);
}
function hideCtx(){document.getElementById('ctxMenu').classList.remove('show')}
function moveChatToFolder(chatId,folderId){
  const chat=state.chats.find(c=>c.id===chatId);if(chat)chat.folderId=folderId;
  saveChats();renderSidebar();hideCtx();
}

// ===== SIDEBAR RENDER =====
function renderSidebar(){
  const list=document.getElementById('sbList');let html='';
  // Groups section header
  if(state.folders.length||true){
    html+='<div class="grp-title-row hide-c"><span>分组</span><button onclick="createFolder()" title="新建分组">+</button></div>';
  }
  state.folders.forEach(f=>{
    const chats=state.chats.filter(c=>c.folderId===f.id);
    html+=`<div class="grp-hdr${f.collapsed?' collapsed':''}" onclick="toggleFolderCollapse('${f.id}')">
      <svg class="arrow" viewBox="0 0 12 12"><path d="M3 2l4 4-4 4"/></svg>
      <svg viewBox="0 0 16 16"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/><path d="M2 4l2-2h4l2 2"/></svg>
      ${f.name} <span style="font-size:11px;color:var(--text-tertiary)">(${chats.length})</span>
      <div class="grp-acts" onclick="event.stopPropagation()">
        <button onclick="renameFolder('${f.id}')" title="重命名"><svg viewBox="0 0 12 12"><path d="M2 10l6-6 2 2-6 6H2v-2z"/></svg></button>
        <button onclick="deleteFolder('${f.id}')" title="删除"><svg viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6"/></svg></button>
      </div></div>`;
    html+=`<div class="grp-body${f.collapsed?' collapsed':''}" style="max-height:${chats.length*46}px">`;
    chats.forEach(c=>{html+=chatItemHTML(c)});
    html+='</div>';
  });
  // Ungrouped
  const ungrouped=state.chats.filter(c=>!c.folderId);
  if(ungrouped.length){
    html+='<div class="grp-title-row hide-c"><span>聊天</span></div>';
    ungrouped.forEach(c=>{html+=chatItemHTML(c)});
  }
  list.innerHTML=html;
}
function chatItemHTML(c){
  return `<div class="chat-item${c.id===state.currentChatId?' active':''}" data-id="${c.id}" onclick="selectChat('${c.id}')" oncontextmenu="showCtxMenu(event,'${c.id}')">
    <span class="chat-title">${c.title}</span>
    <div class="chat-acts">
      <button onclick="startEditChat('${c.id}',event)" title="编辑"><svg viewBox="0 0 12 12"><path d="M2 10l6-6 2 2-6 6H2v-2z"/></svg></button>
      <button onclick="deleteChat('${c.id}',event)" title="删除"><svg viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6"/></svg></button>
    </div></div>`;
}

// ===== CHAT AREA =====
let _renderPending=false,_streamingModelId=null;

function renderReasoning(reasoning,isStreaming,startTime){
  if(!reasoning)return'';
  if(!isStreaming){
    const sec=startTime?Math.round((Date.now()-startTime)/1000):'';
    return `<div class="thinking-done"><svg viewBox="0 0 14 14" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><circle cx="7" cy="7" r="3"/><circle cx="7" cy="7" r="6" stroke-dasharray="2 2"/></svg> 已深度思考${sec?` ${sec}秒`:''}</div>`;
  }
  return `<div class="thinking-block"><div class="thinking-summary"><svg viewBox="0 0 14 14" style="width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2"><circle cx="7" cy="7" r="3"/><circle cx="7" cy="7" r="6" stroke-dasharray="2 2"/></svg>思考中<div class="dot-anim"><span></span><span></span><span></span></div></div><div class="thinking-body">${renderMd(reasoning)}<span class="cursor"></span></div></div>`;
}

function updateStreamingBubble(modelId){
  const safeId='stream-'+modelId.replace(/[^a-z0-9]/gi,'_');
  const el=document.getElementById(safeId);
  if(el&&state.streaming[modelId]){
    const s=state.streaming[modelId];
    el.innerHTML=renderReasoning(s.reasoning,true,s.startTime)+renderMd(s.text)+(s.text||s.reasoning?'':'')+'<span class="cursor"></span>';
    const parent=el.closest('.col-msgs')||el.closest('.chat-area');
    if(parent)parent.scrollTop=parent.scrollHeight;
    return true;
  }
  return false;
}
function scheduleRender(modelId){
  if(_renderPending)return;_renderPending=true;_streamingModelId=modelId;
  requestAnimationFrame(()=>{_renderPending=false;
    if(_streamingModelId&&updateStreamingBubble(_streamingModelId))return;
    renderChatArea();
  });
}

function renderChatArea(){
  const area=document.getElementById('chatArea');
  const chat=getCurrentChat();
  if(!chat||!state.selectedModels.length){
    area.innerHTML='<div class="empty"><div class="ei"><svg viewBox="0 0 24 24"><path d="M12 3L3 7v6l9 5 9-5V7l-9-4z"/><path d="M12 12l9-5M12 12v10M12 12L3 7"/></svg></div><div class="et">选择模型，开始对话</div><div class="es">支持多模型并排对比 · 深度思考</div></div>';
    area.style.padding='24px';return;
  }
  if(state.selectedModels.length===1){area.style.padding='24px';renderSingleMode(area,chat)}
  else{area.style.padding='0';renderMultiMode(area,chat)}
}

function msgActionsHTML(msgIdx){
  return `<div class="msg-actions">
    <button class="msg-act" onclick="copyMsg(${msgIdx})" title="复制"><svg viewBox="0 0 16 16"><rect x="5" y="5" width="8" height="8" rx="1"/><path d="M3 11V3h8"/></svg></button>
    <button class="msg-act" onclick="regenMsg(${msgIdx})" title="重新生成"><svg viewBox="0 0 16 16"><path d="M2 8a6 6 0 0111.5-2M14 8a6 6 0 01-11.5 2"/><path d="M13 3v3h-3M3 13v-3h3"/></svg></button>
    <button class="msg-act" onclick="likeMsg(${msgIdx},this)" title="喜欢"><svg viewBox="0 0 16 16"><path d="M4 7v7h2V7H4zM7 7l1-4a1 1 0 011-1h1l1 2v3h3l-1 7H7V7z"/></svg></button>
    <button class="msg-act" onclick="dislikeMsg(${msgIdx},this)" title="不喜欢"><svg viewBox="0 0 16 16"><path d="M12 9V2h-2v7h2zM9 9l-1 4a1 1 0 01-1 1H6l-1-2V9H2l1-7h7v7z"/></svg></button>
  </div>`;
}

function renderSingleMode(area,chat){
  const modelId=state.selectedModels[0];
  let html='<div class="chat-wrap">';
  chat.messages.forEach((m,i)=>{
    if(m.role==='user') html+=`<div class="msg user"><div class="bubble">${renderMd(m.content)}</div></div>`;
    else if(m.modelId===modelId||!m.modelId){
      const rHtml=m.reasoning?renderReasoning(m.reasoning,false,m.thinkStart):'';
      html+=`<div class="msg ai"><div class="mname">${getModelName(m.modelId||modelId)}</div><div class="bubble">${rHtml}${renderMd(m.content)}</div>${m.error?`<div class="err">${m.error}</div>`:''}${m.content?msgActionsHTML(i):''}</div>`;
    }
  });
  if(state.streaming[modelId]){
    const safeId='stream-'+modelId.replace(/[^a-z0-9]/gi,'_');
    const s=state.streaming[modelId];
    html+=`<div class="msg ai"><div class="mname">${getModelName(modelId)}</div><div class="bubble" id="${safeId}">${renderReasoning(s.reasoning,true,s.startTime)}${renderMd(s.text)}<span class="cursor"></span></div></div>`;
  }
  html+='</div>';area.innerHTML=html;area.scrollTop=area.scrollHeight;
}

function renderMultiMode(area,chat){
  let html='<div class="cols">';
  state.selectedModels.forEach(modelId=>{
    const msgs=chat.messages.filter(m=>{
      if(m.role==='user')return!m.targetModelId||m.targetModelId===modelId;
      return m.modelId===modelId;
    });
    let msgsHtml='';
    msgs.forEach((m,idx)=>{
      const origIdx=chat.messages.indexOf(m);
      if(m.role==='user') msgsHtml+=`<div class="msg user"><div class="bubble">${renderMd(m.content)}</div></div>`;
      else{
        const rHtml=m.reasoning?renderReasoning(m.reasoning,false,m.thinkStart):'';
        msgsHtml+=`<div class="msg ai"><div class="bubble">${rHtml}${renderMd(m.content)}</div>${m.error?`<div class="err">${m.error}</div>`:''}${m.content?msgActionsHTML(origIdx):''}</div>`;
      }
    });
    if(state.streaming[modelId]){
      const safeId='stream-'+modelId.replace(/[^a-z0-9]/gi,'_');
      const s=state.streaming[modelId];
      msgsHtml+=`<div class="msg ai"><div class="bubble" id="${safeId}">${renderReasoning(s.reasoning,true,s.startTime)}${renderMd(s.text)}<span class="cursor"></span></div></div>`;
    }
    const colId='col-'+modelId.replace(/[^a-z0-9]/gi,'_');
    const colDeepActive=state.colDeepThink&&state.colDeepThink[modelId];
    html+=`<div class="col"><div class="col-hdr"><span class="dot"></span>${getModelName(modelId)}</div>
      <div class="col-msgs" id="${colId}">${msgsHtml}</div>
      <div class="col-in"><div class="col-input-wrap">
        <input class="col-input" placeholder="追问..." onkeydown="if(event.isComposing||event.keyCode===229){_imeActive=true;return}if(event.key==='Enter'&&!_imeActive){colSend('${modelId}',this);event.preventDefault()}" onkeyup="if(event.key==='Enter')_imeActive=false">
        <button class="col-send" onclick="colSend('${modelId}',this.closest('.col-input-wrap').querySelector('input'))"><svg viewBox="0 0 14 14"><path d="M7 11V3M7 3L4 6M7 3l3 3"/></svg></button>
      </div>
      <div class="col-tools">
        <button class="col-tbtn${colDeepActive?' active':''}" onclick="toggleColDeepThink('${modelId}')" title="深度思考"><svg viewBox="0 0 14 14"><circle cx="7" cy="7" r="2.5"/><circle cx="7" cy="7" r="5" stroke-dasharray="2 2"/></svg></button>
        <button class="col-tbtn" onclick="toggleToolMenu(event)" title="工具"><svg viewBox="0 0 14 14"><path d="M3 2h8v1.5H3zM2.5 3.5h9v8.5a1.5 1.5 0 01-1.5 1.5H4a1.5 1.5 0 01-1.5-1.5V3.5z"/><path d="M5.5 6.5h3M5.5 9h3"/></svg></button>
      </div></div></div>`;
  });
  html+='</div>';area.innerHTML=html;
  state.selectedModels.forEach(id=>{
    const el=document.getElementById('col-'+id.replace(/[^a-z0-9]/gi,'_'));
    if(el)el.scrollTop=el.scrollHeight;
  });
}

// ===== MARKDOWN =====
function renderMd(text){
  if(!text)return'';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/^\* (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n/g,'<br>')
    .replace(/(<li>.*?<\/li>(<br>)?)+/g,m=>'<ul>'+m.replace(/<br>/g,'')+'</ul>')
    .replace(/<\/blockquote>(<br>)?<blockquote>/g,'\n');
}

// ===== TOOLS =====
function toggleToolMenu(e){
  e.stopPropagation();const menu=document.getElementById('toolMenu');
  menu.classList.toggle('show');
  if(menu.classList.contains('show'))setTimeout(()=>document.addEventListener('click',()=>menu.classList.remove('show'),{once:true}),0);
}
function toggleTool(name){
  const idx=state.activeTools.indexOf(name);
  if(idx>=0)state.activeTools.splice(idx,1);else state.activeTools.push(name);
  renderToolBadges();
}
function renderToolBadges(){
  document.getElementById('toolBadges').innerHTML=state.activeTools.map(t=>`<div class="tbadge">${t}<span class="rx" onclick="removeTool('${t}')">×</span></div>`).join('');
}
function removeTool(name){state.activeTools=state.activeTools.filter(t=>t!==name);renderToolBadges()}

// ===== INPUT =====
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,150)+'px'}
function updateSendBtn(){
  const has=document.getElementById('mainInput').value.trim().length>0;
  document.getElementById('sendBtn').classList.toggle('active',has);
}
let _imeActive=false;
function handleInputKeyDown(e){
  if(e.isComposing||e.keyCode===229){_imeActive=true;return}
  if(e.key==='Enter'&&!e.shiftKey&&!_imeActive){e.preventDefault();sendMessage()}
}
function handleInputKeyUp(e){if(e.key==='Enter')_imeActive=false}

// ===== SEND =====
function sendMessage(){
  const input=document.getElementById('mainInput');
  let text=input.value.trim();
  if(!text||!state.selectedModels.length)return;
  if(state.activeTools.length)text=`[${state.activeTools.join(',')}] ${text}`;
  let chat=getCurrentChat();
  if(!chat){createNewChat();chat=getCurrentChat()}
  if(chat.title==='新对话'&&text.length>0)chat.title=text.slice(0,20)+(text.length>20?'...':'');
  chat.messages.push({role:'user',content:text,ts:Date.now()});
  saveChats();renderSidebar();
  input.value='';autoResize(input);updateSendBtn();
  state.activeTools=[];renderToolBadges();
  if(state.selectedModels.length===1) streamToModel(state.selectedModels[0],chat,getHistory(chat,state.selectedModels[0]));
  else state.selectedModels.forEach(id=>streamToModel(id,chat,getHistory(chat,id)));
  renderChatArea();
}
function colSend(modelId,inputEl){
  const text=inputEl.value.trim();if(!text)return;inputEl.value='';
  const chat=getCurrentChat();if(!chat)return;
  chat.messages.push({role:'user',content:text,ts:Date.now(),targetModelId:modelId});
  saveChats();
  streamToModel(modelId,chat,getHistory(chat,modelId));
  renderChatArea();
}
function getHistory(chat,modelId){
  const relevant=chat.messages.filter(m=>{
    if(m.role==='user')return!m.targetModelId||m.targetModelId===modelId;
    return m.modelId===modelId;
  });
  return relevant.slice(-HISTORY_LIMIT*2).map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}));
}

// ===== STREAMING =====
async function streamToModel(modelId,chat,history,retryCount=0){
  const effectiveId=getEffectiveModelId(modelId);
  const isZhipu=effectiveId.startsWith('zhipu/');
  const isKimi=effectiveId.startsWith('kimi/');
  const isSilicon=effectiveId.startsWith('silicon/');
  let key,endpoint,headers,bodyModel;

  if(isSilicon){
    key=localStorage.getItem('multi_ai_key_silicon');
    if(!key){addError(chat,modelId,'请先设置硅基流动 API Key');renderChatArea();return}
    endpoint='https://api.siliconflow.cn/v1/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
    const short=effectiveId.replace('silicon/','');
    bodyModel=SILICON_MODEL_MAP[short]||short;
  }else if(isKimi){
    key=localStorage.getItem('multi_ai_key_kimi');
    if(!key){addError(chat,modelId,'请先设置 Kimi API Key');renderChatArea();return}
    endpoint='https://api.moonshot.cn/v1/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
    bodyModel=effectiveId.replace('kimi/','');
  }else if(isZhipu){
    key=localStorage.getItem('multi_ai_key_zhipu');
    if(!key){addError(chat,modelId,'请先设置智谱 API Key');renderChatArea();return}
    endpoint='https://open.bigmodel.cn/api/paas/v4/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
    bodyModel=effectiveId.replace('zhipu/','');
  }else{
    key=localStorage.getItem('multi_ai_key');
    if(!key){addError(chat,modelId,'请先设置 OpenRouter API Key');renderChatArea();return}
    endpoint='https://openrouter.ai/api/v1/chat/completions';
    headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`,'HTTP-Referer':location.href};
    bodyModel=effectiveId;
  }

  const controller=new AbortController();
  state.abortControllers[modelId]=controller;
  state.streaming[modelId]={text:'',reasoning:'',done:false,startTime:Date.now()};
  const timeoutId=setTimeout(()=>controller.abort(),TIMEOUT_MS);

  try{
    const res=await fetch(endpoint,{
      method:'POST',headers,
      body:JSON.stringify({model:bodyModel,messages:history,stream:true}),
      signal:controller.signal
    });
    clearTimeout(timeoutId);
    if(!res.ok){
      const errText=await res.text().catch(()=>'');
      if(res.status===429)throw new Error('模型繁忙，请稍后再试');
      throw new Error(`HTTP ${res.status}: ${errText.slice(0,150)}`);
    }
    const reader=res.body.getReader();const decoder=new TextDecoder();let buffer='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();if(data==='[DONE]')break;
        try{
          const j=JSON.parse(data);const delta=j.choices?.[0]?.delta;
          if(delta?.reasoning_content){
            state.streaming[modelId].reasoning+=delta.reasoning_content;
            scheduleRender(modelId);
          }
          if(delta?.content){
            state.streaming[modelId].text+=delta.content;
            scheduleRender(modelId);
          }
        }catch(e){}
      }
    }
    const finalText=state.streaming[modelId].text;
    const finalReasoning=state.streaming[modelId].reasoning;
    const startTime=state.streaming[modelId].startTime;
    delete state.streaming[modelId];delete state.abortControllers[modelId];
    const msg={role:'assistant',modelId,content:finalText,ts:Date.now()};
    if(finalReasoning){msg.reasoning=finalReasoning;msg.thinkStart=startTime}
    chat.messages.push(msg);saveChats();renderChatArea();
  }catch(err){
    clearTimeout(timeoutId);delete state.streaming[modelId];delete state.abortControllers[modelId];
    if(err.name==='AbortError'){
      if(retryCount<MAX_RETRIES){await sleep(RETRY_DELAY);return streamToModel(modelId,chat,history,retryCount+1)}
      addError(chat,modelId,'请求超时（30s）');
    }else if(retryCount<MAX_RETRIES&&!err.message.includes('繁忙')){
      await sleep(RETRY_DELAY);return streamToModel(modelId,chat,history,retryCount+1);
    }else{addError(chat,modelId,err.message||'请求失败')}
    renderChatArea();
  }
}
function addError(chat,modelId,errMsg){chat.messages.push({role:'assistant',modelId,content:'',error:errMsg,ts:Date.now()});saveChats()}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ===== INIT =====
function init(){
  initTheme();updateKeyStatus();renderSidebar();
  if(state.sidebarCollapsed)document.getElementById('sidebar').classList.add('collapsed');
  if(state.chats.length===0)createNewChat();
  else{state.currentChatId=state.chats[0].id;renderSidebar()}
  renderChatArea();updateModelTrigger();updateTopTitle();updateSendBtn();
}
init();
</script>
